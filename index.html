        if(v.length < 6){ msg.innerHTML = `<div class="msg err">6 أحرف على الأقل</div>`; return; }
        const user = firebase.auth().currentUser;
        if(!user){ msg.innerHTML = `<div class="msg err">يجب تسجيل الدخول من جديد أولاً</div>`; return; }
        user.updatePassword(v).then(() => {
          msg.innerHTML = `<div class="msg ok">تم الحفظ</div>`;
          document.getElementById("newSubOwnPass").value = "";
        }).catch(err => {
          if(err.code === "auth/requires-recent-login"){
            msg.innerHTML = `<div class="msg err">يجب تسجيل الخروج والدخول من جديد قبل تغيير كلمة السر.</div>`;
          } else {
            msg.innerHTML = `<div class="msg err">خطأ: ${err.message}</div>`;
          }
        });
      } else {
        if(v.length < 4){ msg.innerHTML = `<div class="msg err">4 أحرف على الأقل</div>`; return; }
        if(me){ me.password = v; saveDB(DB); msg.innerHTML = `<div class="msg ok">تم الحفظ</div>`; }
      }
    };
    return;
  }

  c.innerHTML = `
    <div class="card" style="border-right:5px solid var(--gold);">
      <h2>🔧 إصلاح الصلاحيات</h2>
      <p style="color:var(--muted);font-size:13px;">إذا واجهت مشكلة في الحفظ (إضافة طالب/مجموعة لا تعمل)، جرّب هذا الإصلاح — يعيد تسجيل صلاحياتك في قاعدة البيانات.</p>
      <button class="btn-green" id="repairPermsBtn">🔧 إصلاح الآن</button>
      <div id="repairMsg"></div>
    </div>
    <div class="card">
      <h2>اسمك الظاهر في النظام</h2>
      <p style="color:var(--muted);font-size:13px;">هذا الاسم سيظهر أعلى الشاشة بدلاً من "الإدارة" فقط.</p>
      <div class="row">
        <input id="mainAdminNameInput" placeholder="مثال: الشيخ أحمد" value="${(DB.mainAdminName||"").replace(/"/g,'&quot;')}">
        <button class="btn-green" id="saveMainAdminName">حفظ</button>
      </div>
      <div id="nameMsg"></div>
    </div>
    <div class="card">
      <h2>اسم مستخدم بديل لتسجيل الدخول</h2>
      <p style="color:var(--muted);font-size:13px;">حسابك الأساسي: <strong>${DB.mainAdminEmail||SESSION.adminUsername}</strong>. يمكنك أيضاً إضافة اسم مستخدم بسيط لتسجيل الدخول به بدلاً من كتابة بريدك الإلكتروني كاملاً في كل مرة (كلمة السر تبقى نفسها).</p>
      <div class="row">
        <input id="mainAdminUsernameInput" placeholder="مثال: admin" value="${(DB.mainAdminUsername||"").replace(/"/g,'&quot;')}">
        <button class="btn-green" id="saveMainAdminUsername">حفظ</button>
      </div>
      <div id="usernameMsg"></div>
    </div>
    <div class="card">
      <h2>تغيير كلمة سر المدير الرئيسي</h2>
      <div class="row">
        <input type="password" id="newAdminPass" placeholder="كلمة السر الجديدة">
        <button class="btn-green" id="saveAdminPass">حفظ</button>
      </div>
      <div id="setMsg"></div>
    </div>
    <div class="card">
      <h2>إضافة مستخدم إدارة إضافي (نائب)</h2>
      <p style="color:var(--muted);font-size:13px;">يُنشأ للنائب حساب بريد إلكتروني حقيقي — يمكنه تسجيل الدخول ببريده أو باسم مستخدم بسيط، واستخدام "نسيت كلمة السر؟" لاستعادتها بنفسه.</p>
      <div class="row">
        <div><label>الاسم</label><input id="newSubName" placeholder="مثال: نائب الإدارة أحمد"></div>
        <div><label>البريد الإلكتروني</label><input id="newSubEmail" placeholder="naib@gmail.com"></div>
        <div><label>اسم مستخدم بديل (اختياري)</label><input id="newSubUser" placeholder="مثال: naib1"></div>
        <div><label>كلمة سر مبدئية</label><input id="newSubPass" placeholder="6 أحرف على الأقل"></div>
        <div style="align-self:flex-end;"><button class="btn-green" id="addSubUserBtn">+ إضافة</button></div>
      </div>
      <div id="subUserMsg"></div>
    </div>
    <div id="subUsersList"></div>`;

  document.getElementById("repairPermsBtn").onclick = async () => {
    const msg = document.getElementById("repairMsg");
    msg.innerHTML = `<div class="msg ok">جارٍ الإصلاح...</div>`;
    try{
      await ensureAdminUID();
      await ensureSystemAccountUID();
      DB = await loadDBFromFirebase();
      msg.innerHTML = `<div class="msg ok">✅ تم الإصلاح بنجاح. جرّب الآن إضافة طالب/مجموعة.</div>`;
    }catch(err){
      msg.innerHTML = `<div class="msg err">❌ فشل الإصلاح: ${err && err.message ? err.message : "خطأ غير معروف"}</div>`;
    }
  };

  document.getElementById("saveMainAdminName").onclick = () => {
    const v = document.getElementById("mainAdminNameInput").value.trim();
    DB.mainAdminName = v; saveDB(DB);
    document.getElementById("nameMsg").innerHTML = `<div class="msg ok">تم الحفظ</div>`;
    render();
  };

  document.getElementById("saveMainAdminUsername").onclick = () => {
    const v = document.getElementById("mainAdminUsernameInput").value.trim();
    const msg = document.getElementById("usernameMsg");
    if(v && (DB.adminUsers||[]).some(u=>u.username===v)){ msg.innerHTML = `<div class="msg err">اسم المستخدم هذا مستخدم من قبل نائب</div>`; return; }
    DB.mainAdminUsername = v; saveDB(DB);
    msg.innerHTML = `<div class="msg ok">تم الحفظ</div>`;
  };

  document.getElementById("saveAdminPass").onclick = () => {
    const v = document.getElementById("newAdminPass").value.trim();
    const msg = document.getElementById("setMsg");
    if(v.length < 6){ msg.innerHTML = `<div class="msg err">6 أحرف على الأقل</div>`; return; }
    const user = firebase.auth().currentUser;
    if(!user){ msg.innerHTML = `<div class="msg err">يجب تسجيل الدخول من جديد أولاً</div>`; return; }
    user.updatePassword(v).then(() => {
      msg.innerHTML = `<div class="msg ok">تم تغيير كلمة السر بنجاح</div>`;
      document.getElementById("newAdminPass").value = "";
    }).catch(err => {
      if(err.code === "auth/requires-recent-login"){
        msg.innerHTML = `<div class="msg err">لأسباب أمنية، يجب تسجيل الخروج والدخول من جديد قبل تغيير كلمة السر.</div>`;
      } else {
        msg.innerHTML = `<div class="msg err">حدث خطأ: ${err.message}</div>`;
      }
    });
  };

  document.getElementById("addSubUserBtn").onclick = () => {
    const name = document.getElementById("newSubName").value.trim();
    const email = document.getElementById("newSubEmail").value.trim();
    const username = document.getElementById("newSubUser").value.trim();
    const password = document.getElementById("newSubPass").value.trim();
    const msg = document.getElementById("subUserMsg");
    if(!email || !email.includes("@")){ msg.innerHTML = `<div class="msg err">أدخل بريداً إلكترونياً صحيحاً</div>`; return; }
    if(password.length < 6){ msg.innerHTML = `<div class="msg err">كلمة السر يجب أن تكون 6 أحرف على الأقل</div>`; return; }
    if(username && (username===DB.mainAdminUsername || DB.adminUsers.some(u=>u.username===username))){ msg.innerHTML = `<div class="msg err">اسم المستخدم موجود مسبقاً</div>`; return; }
    if(DB.adminUsers.some(u=>u.email===email)){ msg.innerHTML = `<div class="msg err">هذا البريد مسجّل مسبقاً كنائب</div>`; return; }

    msg.innerHTML = `<div class="msg ok">جارٍ الإنشاء...</div>`;
    const secondaryApp = firebase.apps.find(a=>a.name==="Secondary") || firebase.initializeApp(window.firebaseConfig, "Secondary");
    secondaryApp.auth().createUserWithEmailAndPassword(email, password).then(() => {
      return secondaryApp.auth().signOut();
    }).then(() => {
      DB.adminUsers.push({id:uid(), name, email, username: username||null, createdAt:new Date().toISOString()});
      saveDB(DB);
      document.getElementById("newSubName").value = "";
      document.getElementById("newSubEmail").value = "";
      document.getElementById("newSubUser").value = "";
      document.getElementById("newSubPass").value = "";
      msg.innerHTML = `<div class="msg ok">تم إنشاء الحساب بنجاح</div>`;
      drawSubUsers();
    }).catch(err => {
      if(err.code === "auth/email-already-in-use"){
        msg.innerHTML = `<div class="msg err">هذا البريد مستخدم بالفعل في حساب Firebase آخر</div>`;
      } else {
        msg.innerHTML = `<div class="msg err">خطأ: ${err.message}</div>`;
      }
    });
  };

  function drawSubUsers(){
    const rows = DB.adminUsers.map(u=>`
      <tr>
        <td>${u.name||"—"}</td>
        <td style="font-weight:bold;color:var(--green-d)">${u.email || u.username}</td>
        <td>${u.username||"—"}</td>
        <td>${new Date(u.createdAt).toLocaleDateString("ar-EG")}</td>
        <td><button class="btn-outline btn-sm" data-reset-subuser="${u.id}">إعادة تعيين كلمة السر</button></td>
        <td><button class="btn-danger btn-sm" data-del-subuser="${u.id}">حذف</button></td>
      </tr>`).join("");
    document.getElementById("subUsersList").innerHTML = `
      <div class="card">
        <h2>حسابات الإدارة الإضافية</h2>
        <table>
          <tr><th>الاسم</th><th>البريد الإلكتروني</th><th>اسم مستخدم بديل</th><th>تاريخ الإنشاء</th><th>إعادة تعيين كلمة السر</th><th>حذف</th></tr>
          ${rows || `<tr><td colspan="6" style="color:var(--muted)">لا توجد حسابات إضافية</td></tr>`}
        </table>
      </div>`;
    document.querySelectorAll("[data-reset-subuser]").forEach(btn=>{
      btn.onclick = () => {
        const u = DB.adminUsers.find(x=>x.id===btn.dataset.resetSubuser);
        if(u.email){
          // Real Firebase account: send a genuine reset email
          openModal(`
            <h3>إعادة تعيين كلمة سر: ${u.name||u.email}</h3>
            <p style="color:var(--muted);font-size:13px;">سيتم إرسال رابط إعادة تعيين حقيقي إلى: <strong>${u.email}</strong></p>
            <div id="mResetMsg"></div>
            <div class="row" style="justify-content:flex-end;margin-top:16px;">
              <button class="btn-outline btn-sm" id="mResetCancel">إلغاء</button>
              <button class="btn-green btn-sm" id="mResetSend">إرسال الرابط</button>
            </div>`);
          document.getElementById("mResetCancel").onclick = closeModal;
          document.getElementById("mResetSend").onclick = () => {
            firebase.auth().sendPasswordResetEmail(u.email).then(() => {
              document.getElementById("mResetMsg").innerHTML = `<div class="msg ok">تم إرسال رابط إعادة التعيين بنجاح</div>`;
            }).catch(err => {
              document.getElementById("mResetMsg").innerHTML = `<div class="msg err">تعذّر الإرسال: ${err.message}</div>`;
            });
          };
        } else {
          // Legacy local naib (no Firebase email account)
          openModal(`
            <h3>إعادة تعيين كلمة سر: ${u.username}</h3>
            <label>كلمة السر الجديدة</label>
            <input type="password" id="mResetPass">
            <div id="mResetMsg"></div>
            <div class="row" style="justify-content:flex-end;margin-top:16px;">
              <button class="btn-outline btn-sm" id="mResetCancel">إلغاء</button>
              <button class="btn-green btn-sm" id="mResetSave">حفظ</button>
            </div>`);
          document.getElementById("mResetCancel").onclick = closeModal;
          document.getElementById("mResetSave").onclick = () => {
            const v = document.getElementById("mResetPass").value.trim();
            if(v.length < 4){ document.getElementById("mResetMsg").innerHTML = `<div class="msg err">4 أحرف على الأقل</div>`; return; }
            u.password = v; saveDB(DB); closeModal();
          };
        }
      };
    });
    document.querySelectorAll("[data-del-subuser]").forEach(btn=>{
      btn.onclick = () => {
        showConfirm("حذف هذا الحساب؟", () => {
          DB.adminUsers = DB.adminUsers.filter(u=>u.id!==btn.dataset.delSubuser);
          saveDB(DB); drawSubUsers();
        });
      };
    });
  }
  drawSubUsers();
}

/* ---------------- Teacher Dashboard ---------------- */
function renderTeacher(){
  const g = DB.groups.find(x=>x.id===SESSION.groupId);
  const studs = DB.students.filter(s=>s.groupId===g.id);
  const today = todayStr();
  const groupStudentIds = new Set(studs.map(s=>s.id));
  const activeExcuses = allExcuses().filter(e=> groupStudentIds.has(e.studentId) && e.to >= today);
  const monthNames = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const groupAnnouncements = DB.monthlyAnnouncements.filter(a=>a.groupId===g.id).sort((a,b)=> (b.year-a.year) || (b.month-a.month));
  const announceBanner = groupAnnouncements.length ? `
    <div class="card" style="border-right:5px solid var(--gold);background:#FFFBEF;">
      <h2>🏆 نتيجة الشهر</h2>
      ${groupAnnouncements.slice(0,1).map(a=>`
        <p style="margin:0;font-size:15px;">
          ${studentWord({gender:a.topStudentGender}, true)} ${ordinalWord({gender:a.topStudentGender})} في ${g.name} لشهر <strong>${monthNames[a.month-1]} ${a.year}</strong> هو/هي:
          <strong style="color:var(--green-d)">${a.topStudentCode} — ${a.topStudentName}</strong>
          <span style="color:var(--muted);font-size:13px;">(المجموع الإيجابي: ${a.positive})</span>
        </p>`).join("")}
    </div>` : "";

  const curYM = today.slice(0,7);
  const isSighar = g.curriculum === "sighar";
  const stageWord = isSighar ? "المرحلة" : "السورة";
  const missingSurahStuds = studs.filter(s => !s.currentSurah || (s.surahUpdatedAt||"").slice(0,7) !== curYM);
  const surahReminder = missingSurahStuds.length ? `
    <div class="card" style="border-right:5px solid var(--error);">
      <h2>📖 تذكير: تحديث ${stageWord} الطلاب لهذا الشهر</h2>
      <p style="color:var(--muted);font-size:13px;">${missingSurahStuds.length} طالب بحاجة لتحديد ${stageWord} الحالية لهذا الشهر. حدّثها من القسم أدناه.</p>
    </div>` : "";
  const surahOptionsList = isSighar ? MANHAJ_SIGHAR : SURAHS;
  const surahOptions = surahOptionsList.map(n=>`<option>${n}</option>`).join("");
  const surahCard = `
    <div class="card">
      <h2>📖 ${stageWord} الطلاب الحالية — ${monthNames[new Date().getMonth()]} ${new Date().getFullYear()}</h2>
      <table>
        <tr><th>الرقم</th><th>الاسم</th><th>${stageWord} الحالية</th><th>تحديث</th></tr>
        ${studs.map(s=>{
          const upToDate = s.currentSurah && (s.surahUpdatedAt||"").slice(0,7) === curYM;
          return `<tr>
            <td style="font-weight:bold;color:var(--green-d)">${s.code}</td>
            <td class="name-cell">${s.name} <span style="font-size:11px;color:var(--muted)">(${studentWord(s)})</span> ${upToDate?'<span style="color:var(--present);font-size:11px;">✓ محدّثة</span>':'<span style="color:var(--error);font-size:11px;">بحاجة تحديث</span>'}</td>
            <td>${s.currentSurah||'<span style="color:var(--muted);font-size:12px;">لم تُحدَّد</span>'}</td>
            <td>
              <select data-surah-sid="${s.id}" style="min-width:150px;">
                <option value="">اختر ${stageWord}...</option>
                ${surahOptions}
              </select>
            </td>
          </tr>`;
        }).join("") || `<tr><td colspan="4" style="color:var(--muted)">لا يوجد طلاب/طالبات</td></tr>`}
      </table>
    </div>`;
  const myMessages = DB.messages.filter(m=>!m.groupId || m.groupId===g.id).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const unreadCount = myMessages.filter(m=>m.createdAt > lastSeen).length;
  const inboxCard = `
    <div class="card">
      <h2>📥 رسائل الإدارة ${unreadCount ? `<span class="badge" style="background:var(--error);">${unreadCount} جديدة</span>` : ""}</h2>
      ${myMessages.length ? myMessages.map(m=>{
        const isNew = m.createdAt > lastSeen;
        const dateTxt = new Date(m.createdAt).toLocaleString("ar-EG");
        return `<div style="padding:8px 0;border-bottom:1px solid var(--border);${isNew?'background:#FDECEA;':''}">
          <span style="color:var(--muted);font-size:11px;">${dateTxt}${!m.groupId?' · بث عام':''}</span>
          <p style="margin:4px 0 0;">${m.text}</p>
        </div>`;
      }).join("") : `<p style="color:var(--muted);font-size:13px;">لا توجد رسائل من الإدارة بعد</p>`}
    </div>`;
  DB.lastSeen[g.id] = new Date().toISOString();
  saveDB(DB);
  const excuseBanner = activeExcuses.length ? `
    <div class="card" style="border-right:5px solid var(--gold);">
      <h2>📝 إشعارات الأعذار</h2>
      ${activeExcuses.map(e=>{
        const s = DB.students.find(x=>x.id===e.studentId);
        const isToday = e.from <= today && today <= e.to;
        const rangeTxt = e.from===e.to ? fmtDate(e.from) : `${e.from} → ${e.to}`;
        return `<div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <strong style="color:${isToday?'var(--error)':'var(--muted)'}">${isToday?"⚠️ اليوم — ":""}${s? s.code+" — "+s.name+" ("+studentWord(s)+")" : ""}</strong>
          <span style="color:var(--muted);font-size:13px;"> — ${rangeTxt} — ${e.reason}</span>
        </div>`;
      }).join("")}
    </div>` : "";

  const NOTE_CATS = ["سلوك سيئ","غياب متكرر","ضعف في التسميع","أخرى"];
  const noteCard = `
    <div class="card">
      <h2>📋 كتابة ملاحظة عن طالب</h2>
      <p style="color:var(--muted);font-size:13px;">تصل الملاحظة مباشرة إلى لوحة الإدارة.</p>
      <div class="row">
        <div><label>الطالب/ة</label><select id="noteStudent">${studs.map(s=>`<option value="${s.id}">${s.code} — ${s.name} (${studentWord(s)})</option>`).join("") || "<option value=''>لا يوجد طلاب/طالبات</option>"}</select></div>
        <div><label>نوع الملاحظة</label><select id="noteCategory">${NOTE_CATS.map(cat=>`<option>${cat}</option>`).join("")}</select></div>
      </div>
      <div style="margin-top:10px;">
        <label>تفاصيل الملاحظة</label>
        <input id="noteText" style="width:100%" placeholder="اكتب وصف الملاحظة...">
      </div>
      <button class="btn-green" style="margin-top:10px;" id="noteSaveBtn">📤 إرسال إلى الإدارة</button>
      <div id="noteMsg"></div>
    </div>`;

  const myExams = allExams().filter(ex=>ex.groupId===g.id && ex.type==="فصلي").sort((a,b)=>b.date.localeCompare(a.date));
  const examCard = `
    <div class="card">
      <h2>📝 اختبار الفصل — ${g.name}</h2>
      <div class="row">
        <div><label>عنوان الاختبار</label><input id="tExamTitle" placeholder="مثال: اختبار مراجعة أسبوعية"></div>
        <div><label>المادة/الموضوع</label><input id="tExamSubject" placeholder="مثال: حفظ القرآن"></div>
        <div><label>التاريخ</label><input type="date" id="tExamDate" value="${todayStr()}"></div>
        <div><label>الدرجة الكاملة</label><input type="number" id="tExamMaxScore" value="100"></div>
        <div style="align-self:flex-end;"><button class="btn-green" id="tAddExamBtn">+ إنشاء</button></div>
      </div>
      <div id="tExamMsg"></div>
      <div id="tExamsList" style="margin-top:10px;">
        ${myExams.length ? myExams.map(ex=>{
          const cnt = allExamResults().filter(r=>r.examId===ex.id).length;
          return `<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding:6px 0;">
            <span>${ex.title} <span style="color:var(--muted);font-size:12px;">— ${ex.date} (${cnt}/${studs.length})</span></span>
            <button class="btn-outline btn-sm" data-t-enter-exam="${ex.id}">📝 إدخال النتائج</button>
          </div>`;
        }).join("") : `<p style="color:var(--muted);font-size:13px;">لا توجد اختبارات بعد لهذا الفصل.</p>`}
      </div>
      <div id="tExamResultsWrap"></div>
    </div>`;

  const officialResults = studs.flatMap(s => resultsFor(s.id).filter(r=>r.examType==="إداري" && r.published!==false).map(r=>({...r, studentName:s.name, studentCode:s.code})));
  const officialResultsCard = officialResults.length ? `
    <div class="card">
      <h2>🏛️ نتائج الامتحانات الإدارية المنشورة — ${g.name}</h2>
      <table>
        <tr><th>الطالب/ة</th><th>الامتحان</th><th>التاريخ</th><th>الدرجة</th><th>التقدير</th></tr>
        ${officialResults.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`
          <tr>
            <td class="name-cell">${r.studentCode} — ${r.studentName}</td>
            <td>${r.examTitle}</td>
            <td>${r.date}</td>
            <td>${r.score}/${r.maxScore} (${r.percentage}%)</td>
            <td style="color:${gradeColor(r.grade)};font-weight:bold;">${r.grade}</td>
          </tr>`).join("")}
      </table>
    </div>` : "";

  app.innerHTML = `
    ${excuseBanner}
    ${announceBanner}
    ${surahReminder}
    ${inboxCard}
    ${surahCard}
    ${examCard}
    ${officialResultsCard}
    ${noteCard}
    <div class="card">
      <h2>تسجيل الحضور — ${g.name}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:-6px;">المعلم/ة: <strong style="color:var(--green-d)">${g.teacherName || "—"}</strong></p>
      <div class="row">
        <div><label>التاريخ</label><input type="date" id="tDate" value="${todayStr()}"></div>
        <div style="align-self:flex-end;">
          <button class="btn-outline btn-sm" id="tDateMinus">-1 يوم</button>
          <button class="btn-outline btn-sm" id="tDatePlus">+1 يوم</button>
        </div>
      </div>
      <div class="legend" style="margin:10px 0;">
        <span>✓ = حاضر/صح</span><span>x = خطأ</span><span>ت = تأخر</span><span>غ = غياب</span><span style="color:var(--noquran)">م = لا يوجد قرآن هذا الأسبوع</span>
      </div>
      <div class="row" style="margin-bottom:10px;">
        <div style="flex:1;min-width:220px;">
          <label>🔎 راجع الطالب برقمه أو اسمه</label>
          <input id="tSearch" style="width:100%" placeholder="مثال: R-0007 أو اسم الطالب">
        </div>
      </div>
      <div id="lockBanner"></div>
      <table id="tTable"></table>
      <div style="margin-top:14px;">
        <button class="btn-gold" id="finalizeBtn">✅ إنهاء الدرس وتثبيت الحضور</button>
        <span id="saveMsg" style="margin-right:10px;"></span>
      </div>
    </div>`;

  function isWeekend(date){
    const dow = new Date(date+"T00:00:00").getDay(); // 0=Sun...4=Thu,5=Fri,6=Sat
    return dow===4 || dow===5; // shifted night-date: Thursday & Friday = center's weekend
  }
  function drawTable(){
    const date = document.getElementById("tDate").value;
    const q = (document.getElementById("tSearch").value||"").trim().toLowerCase();
    const filtered = q ? studs.filter(s=>s.code.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)) : studs;
    const weekend = isWeekend(date);
    const locked = weekend || isLocked(date, g.id);

    document.getElementById("lockBanner").innerHTML = weekend ? `
      <div class="msg err" style="border:1px solid var(--error);">🚫 ${fmtDate(date)} عطلة نهاية الأسبوع بالمركز (الخميس والجمعة) — لا يوجد حضور في هذا اليوم.</div>`
      : isLocked(date, g.id) ? `
      <div class="msg ok" style="border:1px solid var(--present);">✅ تم تثبيت حضور ${fmtDate(date)} — أي تعديل الآن يتطلب صلاحية الإدارة.</div>` : "";
    document.getElementById("finalizeBtn").style.display = locked ? "none" : "inline-block";

    const rows = filtered.map(s=>{
      const current = getAttendance(s.id, date);
      const suspended = (s.status||"نشط") !== "نشط";
      const btns = MARKS.map(m=>`<button type="button" class="mbtn ${current===m.code?'sel-'+m.cls:''}" data-sid="${s.id}" data-mark="${m.code}" ${(locked||suspended)?'disabled':''} title="${m.label}">${m.code}</button>`).join("");
      const isExcused = excusesFor(s.id).some(e=>e.from<=date && date<=e.to);
      const excBadge = isExcused ? ` <span style="color:var(--gold-d);font-size:11px;font-weight:bold;">(معذور)</span>` : "";
      const statusBadge = suspended ? ` <span style="color:var(--error);font-size:11px;font-weight:bold;">⛔ ${s.status}</span>` : "";
      return `<tr ${suspended?'style="opacity:.6;"':''}><td style="font-weight:bold;color:var(--green-d)">${s.code}</td><td class="name-cell">${s.name} <span style="font-size:11px;color:var(--muted)">(${studentWord(s)})</span>${excBadge}${statusBadge}</td><td><div class="mark-btns">${btns}</div></td></tr>`;
    }).join("");
    document.getElementById("tTable").innerHTML = `<tr><th>الرقم</th><th>الاسم</th><th>الحالة</th></tr>${rows || `<tr><td colspan="3" style="color:var(--muted)">${q ? "لا يوجد طالب/طالبة مطابق" : "لا يوجد طلاب/طالبات في هذه المجموعة بعد. اطلب من الإدارة إضافتهم."}</td></tr>`}`;

    if(locked) return;
    document.querySelectorAll(".mbtn").forEach(btn=>{
      btn.onclick = () => {
        const sid = btn.dataset.sid, mark = btn.dataset.mark;
        setAttendanceMark(sid, date, mark);
        saveDB(DB);
        document.getElementById("saveMsg").innerHTML = `<span style="color:var(--present);font-size:12px;">✓ تم الحفظ</span>`;
        drawTable();
      };
    });
  }
  document.querySelectorAll("[data-surah-sid]").forEach(sel=>{
    sel.onchange = () => {
      if(!sel.value) return;
      const s = DB.students.find(x=>x.id===sel.dataset.surahSid);
      s.currentSurah = sel.value;
      s.surahUpdatedAt = new Date().toISOString();
      saveDB(DB);
      renderTeacher();
    };
  });
  document.getElementById("tDate").onchange = drawTable;
  function shiftTDate(delta){
    const input = document.getElementById("tDate");
    const d = new Date(input.value+"T00:00:00");
    d.setDate(d.getDate()+delta);
    input.value = d.toISOString().slice(0,10);
    drawTable();
  }
  document.getElementById("tDateMinus").onclick = () => shiftTDate(-1);
  document.getElementById("tDatePlus").onclick = () => shiftTDate(1);
  document.getElementById("tSearch").oninput = drawTable;
  document.getElementById("tAddExamBtn").onclick = () => {
    const title = document.getElementById("tExamTitle").value.trim();
    const subject = document.getElementById("tExamSubject").value.trim();
    const date = document.getElementById("tExamDate").value;
    const maxScore = parseInt(document.getElementById("tExamMaxScore").value) || 100;
    const msg = document.getElementById("tExamMsg");
    if(!title){ msg.innerHTML = `<div class="msg err">أدخل عنوان الاختبار</div>`; return; }
    const exam = {id:uid(), title, type:"فصلي", groupId:g.id, subject, date, maxScore, createdBy:"teacher", createdAt:new Date().toISOString()};
    addExam(exam);
    saveDB(DB);
    msg.innerHTML = `<div class="msg ok">تم إنشاء الاختبار</div>`;
    renderTeacher();
  };
  document.querySelectorAll("[data-t-enter-exam]").forEach(btn=>{
    btn.onclick = () => {
      const examId = btn.dataset.tEnterExam;
      const ex = examById(examId);
      document.getElementById("tExamResultsWrap").innerHTML = `
        <table style="margin-top:10px;">
          <tr><th>الرقم</th><th>الاسم</th><th>الدرجة</th><th>النسبة</th><th>التقدير</th><th>حفظ</th></tr>
          ${studs.map(s=>{
            const existing = resultsFor(s.id).find(r=>r.examId===examId);
            return `<tr>
              <td style="font-weight:bold;color:var(--green-d)">${s.code}</td>
              <td class="name-cell">${s.name}</td>
              <td><input type="number" data-tscore="${s.id}" value="${existing?existing.score:''}" style="width:70px;" min="0" max="${ex.maxScore}"></td>
              <td><span data-tpct="${s.id}">${existing?existing.percentage+'%':'—'}</span></td>
              <td><span data-tgrade="${s.id}" style="color:${existing?gradeColor(existing.grade):'var(--muted)'};font-weight:bold;">${existing?existing.grade:'—'}</span></td>
              <td><button class="btn-green btn-sm" data-t-save-result="${s.id}">حفظ</button></td>
            </tr>`;
          }).join("")}
        </table>
        <div id="tResultsSaveMsg"></div>`;
      document.querySelectorAll("[data-t-save-result]").forEach(sbtn=>{
        sbtn.onclick = () => {
          const sid = sbtn.dataset.tSaveResult;
          const s = DB.students.find(x=>x.id===sid);
          const score = parseFloat(document.querySelector(`[data-tscore="${sid}"]`).value);
          const rmsg = document.getElementById("tResultsSaveMsg");
          if(isNaN(score) || score < 0 || score > ex.maxScore){ rmsg.innerHTML = `<div class="msg err">أدخل درجة صحيحة (0-${ex.maxScore})</div>`; return; }
          const percentage = Math.round((score/ex.maxScore)*100);
          const grade = computeGrade(percentage);
          const existing = resultsFor(sid).find(r=>r.examId===examId);
          addExamResult(sid, {
            id: existing ? existing.id : uid(),
            examId, studentId: sid, examTitle: ex.title, examType: ex.type, date: ex.date,
            score, maxScore: ex.maxScore, percentage, grade, recommendation: existing?existing.recommendation:"", published: !!ex.published,
            enteredAt: new Date().toISOString()
          });
          saveDB(DB);
          document.querySelector(`[data-tpct="${sid}"]`).textContent = percentage+"%";
          const gEl = document.querySelector(`[data-tgrade="${sid}"]`);
          gEl.textContent = grade; gEl.style.color = gradeColor(grade);
          rmsg.innerHTML = `<div class="msg ok">تم حفظ نتيجة ${s.name}</div>`;
        };
      });
    };
  });
  if(document.getElementById("noteSaveBtn")){
    document.getElementById("noteSaveBtn").onclick = () => {
      const sid = document.getElementById("noteStudent").value;
      const category = document.getElementById("noteCategory").value;
      const text = document.getElementById("noteText").value.trim();
      const msg = document.getElementById("noteMsg");
      if(!sid){ msg.innerHTML = `<div class="msg err">اختر طالباً</div>`; return; }
      if(!text){ msg.innerHTML = `<div class="msg err">اكتب تفاصيل الملاحظة</div>`; return; }
      addNote(sid, {id:uid(), studentId:sid, groupId:g.id, teacherName:g.teacherName||"—", category, text, createdAt:new Date().toISOString(), contacted:false});
      saveDB(DB);
      msg.innerHTML = `<div class="msg ok">تم الإرسال إلى الإدارة</div>`;
      document.getElementById("noteText").value = "";
    };
  }
  document.getElementById("finalizeBtn").onclick = () => {
    const date = document.getElementById("tDate").value;
    showConfirm("بعد التثبيت لن تتمكن من تعديل حضور هذا اليوم إلا عبر الإدارة. هل تريد المتابعة؟", () => {
      setLock(date, g.id, true);
      drawTable();
    });
  };
  drawTable();
}

/* ---------------- Parent Portal ---------------- */
function renderParent(){
  if(!PARENT_STATE){ SESSION = null; render(); return; }
  const s = PARENT_STATE.students.find(x=>x.id===SESSION.studentId) || PARENT_STATE.students[0];
  if(!s){ SESSION = null; render(); return; }
  const isSighar = s.curriculum === "sighar";
  const stageWord = isSighar ? "المرحلة" : "السورة";

  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth()+1;
  const days = workdaysInMonth(year, month);
  let pPresent=0, recorded=0;
  const records = [];
  days.forEach(date=>{
    const mark = (PARENT_STATE.attendance[s.id] && PARENT_STATE.attendance[s.id][date]) || "";
    if(mark){
      recorded++;
      records.push({date, mark});
      if(mark==="✓") pPresent++;
    }
  });
  const attPct = recorded ? Math.round((pPresent/recorded)*100) : 0;
  records.sort((a,b)=>b.date.localeCompare(a.date));

  const due = computeFeeAmountFor(s);
  const paid = Object.values(PARENT_STATE.feePayments[s.id] || {}).filter(p=>p.year===year && p.month===month).reduce((sum,p)=>sum+p.amount,0);
  const remaining = Math.max(due-paid, 0);
  const fStatus = feeStatus(due, paid);
  const fColor = fStatus==="مدفوع بالكامل"?"var(--present)":fStatus==="مدفوع جزئياً"?"var(--late)":fStatus==="معفى"?"var(--muted)":"var(--error)";

  const myNotes = (PARENT_STATE.notes[s.id]||[]).slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,5);
  const announcement = PARENT_STATE.monthlyAnnouncements.filter(a=>a.groupId===s.groupId).sort((a,b)=>(b.year-a.year)||(b.month-a.month))[0];
  const monthNames = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const labelMap = {"✓":"حاضر/صح","x":"خطأ","ت":"تأخر","غ":"غياب","م":"لا يوجد قرآن"};
  const colorMap = {"✓":"var(--present)","x":"var(--error)","ت":"var(--late)","غ":"var(--absent)","م":"var(--noquran)"};

  const childSwitcher = PARENT_STATE.students.length > 1 ? `
    <div class="card no-print">
      <label>اختر الابن/الابنة</label>
      <select id="childSwitch" style="width:100%">
        ${PARENT_STATE.students.map(c=>`<option value="${c.id}" ${c.id===s.id?"selected":""}>${c.name} — ${c.groupName||""}</option>`).join("")}
      </select>
    </div>` : "";

  app.innerHTML = `
    ${childSwitcher}
    <div class="card">
      <h2>${s.name} <span style="font-size:12px;color:var(--muted);font-weight:normal;">(${s.code}) — ${s.groupName||"—"}</span></h2>
      <div class="stat-cards">
        <div class="stat"><div class="n" style="color:var(--present)">${attPct}%</div><div class="l">نسبة الحضور (${monthNames[month-1]})</div></div>
        <div class="stat"><div class="n" style="color:${fColor}">${fStatus}</div><div class="l">حالة الرسوم هذا الشهر</div></div>
        <div class="stat"><div class="n" style="color:var(--green-d);font-size:16px;">${s.currentSurah||"—"}</div><div class="l">${stageWord} الحالية</div></div>
      </div>
    </div>

    ${announcement && announcement.topStudentId===s.id ? `
    <div class="card" style="border-right:5px solid var(--gold);background:#FFFBEF;">
      <h2>🏆 مبروك!</h2>
      <p style="margin:0;">${studentWord(s)} <strong>${s.name}</strong> حصل/ت على المركز الأول في ${s.groupName||""} لشهر ${monthNames[announcement.month-1]} ${announcement.year} 🎉</p>
    </div>` : ""}

    <div class="card">
      <h2>💰 الرسوم — ${monthNames[month-1]} ${year}</h2>
      <table>
        <tr><th>المطلوب</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr>
        <tr>
          <td>${due.toLocaleString()} DJF</td>
          <td style="color:var(--present);font-weight:bold;">${paid.toLocaleString()} DJF</td>
          <td style="color:${remaining>0?'var(--error)':'var(--muted)'};font-weight:bold;">${remaining.toLocaleString()} DJF</td>
          <td style="color:${fColor};font-weight:bold;">${fStatus}</td>
        </tr>
      </table>
    </div>

    <div class="card">
      <h2>📋 سجل الحضور — ${monthNames[month-1]} ${year}</h2>
      <table>
        <tr><th>التاريخ</th><th>الحالة</th></tr>
        ${records.map(r=>`<tr><td>${fmtDate(r.date)}</td><td style="color:${colorMap[r.mark]};font-weight:bold;">${r.mark} — ${labelMap[r.mark]}</td></tr>`).join("") || `<tr><td colspan="2" style="color:var(--muted)">لا يوجد سجل بعد لهذا الشهر</td></tr>`}
      </table>
    </div>

    ${myNotes.length ? `
    <div class="card">
      <h2>📝 ملاحظات المعلم/ة</h2>
      ${myNotes.map(n=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span class="badge" style="background:var(--noquran);">${n.category}</span>
        <span style="color:var(--muted);font-size:11px;"> — ${new Date(n.createdAt).toLocaleDateString("ar-EG")}</span>
        <p style="margin:4px 0 0;">${n.text}</p>
      </div>`).join("")}
    </div>` : ""}

    ${(PARENT_STATE.examResults[s.id]||[]).filter(r=>r.published!==false).length ? `
    <div class="card">
      <h2>📝 نتائج الامتحانات</h2>
      <table>
        <tr><th>الامتحان</th><th>النوع</th><th>التاريخ</th><th>الدرجة</th><th>النسبة</th><th>التقدير</th></tr>
        ${(PARENT_STATE.examResults[s.id]||[]).filter(r=>r.published!==false).slice().sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`
          <tr>
            <td class="name-cell">${r.examTitle}</td>
            <td><span class="badge" style="background:${r.examType==='إداري'?'var(--gold)':'var(--noquran)'};font-size:11px;">${r.examType}</span></td>
            <td>${r.date}</td>
            <td>${r.score}/${r.maxScore}</td>
            <td>${r.percentage}%</td>
            <td style="color:${gradeColor(r.grade)};font-weight:bold;">${r.grade}</td>
          </tr>`).join("")}
      </table>
      ${(PARENT_STATE.examResults[s.id]||[]).filter(r=>r.published!==false).some(r=>r.recommendation) ? `
        <div style="margin-top:10px;">
          ${(PARENT_STATE.examResults[s.id]||[]).filter(r=>r.published!==false && r.recommendation).map(r=>`
            <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
              <strong>${r.examTitle}:</strong> <span style="color:var(--muted);">${r.recommendation}</span>
            </div>`).join("")}
        </div>` : ""}
    </div>` : ""}

    <div class="card">
      <h2>📝 تقديم عذر</h2>
      <p style="color:var(--muted);font-size:13px;">إذا كان ${studentWord(s)} سيتغيّب لسبب معين، يمكنك تسجيل عذر هنا ليصل مباشرة إلى المعلم/ة.</p>
      <div class="row">
        <div><label>من تاريخ</label><input type="date" id="pExcFrom" value="${todayStr()}"></div>
        <div><label>إلى تاريخ</label><input type="date" id="pExcTo" value="${todayStr()}"></div>
      </div>
      <div style="margin-top:10px;">
        <label>السبب</label>
        <input id="pExcReason" style="width:100%" placeholder="مثال: مريض، سفر عائلي...">
      </div>
      <button class="btn-green" style="margin-top:10px;" id="pExcSaveBtn">إرسال العذر</button>
      <div id="pExcMsg"></div>
    </div>`;

  if(document.getElementById("childSwitch")){
    document.getElementById("childSwitch").onchange = (e) => {
      SESSION.studentId = e.target.value;
      render();
    };
  }

  document.getElementById("pExcSaveBtn").onclick = () => {
    const from = document.getElementById("pExcFrom").value;
    const to = document.getElementById("pExcTo").value;
    const reason = document.getElementById("pExcReason").value.trim();
    const msg = document.getElementById("pExcMsg");
    if(!reason){ msg.innerHTML = `<div class="msg err">اكتب سبب العذر</div>`; return; }
    if(to < from){ msg.innerHTML = `<div class="msg err">تاريخ النهاية قبل تاريخ البداية</div>`; return; }
    const newExcuse = {id:uid(), studentId:s.id, from, to, reason, createdAt:todayStr()};
    // Targeted write: only touches this student's excuses bucket, allowed by restricted parent rules
    firebase.database().ref("rayyanDB/excuses/"+s.id+"/"+newExcuse.id).set(newExcuse).then(() => {
      if(!PARENT_STATE.excuses[s.id]) PARENT_STATE.excuses[s.id] = [];
      PARENT_STATE.excuses[s.id].push(newExcuse);
      msg.innerHTML = `<div class="msg ok">تم إرسال العذر بنجاح</div>`;
      document.getElementById("pExcReason").value = "";
    }).catch(err => {
      msg.innerHTML = `<div class="msg err">تعذّر الإرسال: ${err.message}</div>`;
    });
  };
}
