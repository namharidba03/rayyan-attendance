<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مركز الريان - نظام الحضور والغياب</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --green:#1F6F3D; --green-d:#155029; --gold:#C9A227; --gold-d:#a9861a;
    --bg:#F5F7F5; --card:#FFFFFF; --border:#DDE3DE; --text:#1C2A22; --muted:#66756C;
    --present:#2E7D32; --error:#D32F2F; --late:#F5A623; --absent:#6D6D6D; --noquran:#6A5AE0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header.top{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  header.top h1{margin:0;font-size:19px;}
  header.top .sub{font-size:12px;opacity:.85;}
  .badge{background:var(--gold);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card h2{margin-top:0;font-size:16px;color:var(--green-d);border-bottom:2px solid var(--gold);padding-bottom:8px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  label{font-size:13px;font-weight:bold;color:var(--muted);display:block;margin-bottom:4px;}
  input,select{padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
  input:focus,select:focus{outline:2px solid var(--green);border-color:var(--green);}
  button{cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:bold;font-family:inherit;transition:.15s;}
  .btn-green{background:var(--green);color:#fff;} .btn-green:hover{background:var(--green-d);}
  .btn-gold{background:var(--gold);color:#fff;} .btn-gold:hover{background:var(--gold-d);}
  .btn-outline{background:#fff;border:1.5px solid var(--green);color:var(--green);}
  .btn-outline:hover{background:#eef7f0;}
  .btn-danger{background:#fff;border:1.5px solid var(--error);color:var(--error);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{border:1px solid var(--border);padding:7px 8px;text-align:center;}
  th{background:var(--green);color:#fff;}
  tr:nth-child(even){background:#F2F7F3;}
  .name-cell{text-align:right;font-weight:600;}
  .hidden{display:none !important;}
  .center{display:flex;align-items:center;justify-content:center;min-height:70vh;}
  .login-card{width:380px;text-align:center;}
  .login-card h2{border:none;}
  .role-btns{display:flex;gap:12px;margin-top:14px;}
  .role-btns button{flex:1;padding:16px;font-size:15px;}
  .admin-layout{display:flex;gap:18px;align-items:flex-start;}
  .admin-sidebar{width:230px;flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 100px);overflow-y:auto;position:sticky;top:16px;scrollbar-width:thin;}
  .admin-sidebar::-webkit-scrollbar{width:6px;}
  .admin-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .admin-content{flex:1;min-width:0;}
  .tab{padding:10px 14px;border-radius:8px;background:#fff;border:1px solid transparent;cursor:pointer;font-size:13.5px;font-weight:bold;color:var(--muted);text-align:right;white-space:nowrap;}
  .tab:hover{background:#F2F7F3;}
  .tab.active{background:var(--green);color:#fff;border-color:var(--green);}
  .mark-btns{display:flex;gap:4px;justify-content:center;}
  .mbtn{width:34px;height:30px;border-radius:6px;font-weight:bold;font-size:13px;border:1.5px solid var(--border);background:#fff;color:var(--muted);}
  .mbtn.sel-present{background:var(--present);color:#fff;border-color:var(--present);}
  .mbtn.sel-error{background:var(--error);color:#fff;border-color:var(--error);}
  .mbtn.sel-late{background:var(--late);color:#fff;border-color:var(--late);}
  .mbtn.sel-absent{background:var(--absent);color:#fff;border-color:var(--absent);}
  .mbtn.sel-noquran{background:var(--noquran);color:#fff;border-color:var(--noquran);}
  .stat-cards{display:flex;gap:12px;flex-wrap:wrap;}
  .stat{flex:1;min-width:110px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
  .stat .n{font-size:22px;font-weight:bold;}
  .stat .l{font-size:12px;color:var(--muted);}
  .group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
  .group-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;}
  .group-box:hover{border-color:var(--green);}
  .group-box h3{margin:0 0 6px;font-size:14px;color:var(--green-d);}
  .msg{font-size:13px;padding:8px 12px;border-radius:6px;margin-top:8px;}
  .msg.ok{background:#E8F5E9;color:var(--present);}
  .msg.err{background:#FDECEA;color:var(--error);}
  .legend{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;}
  .autocomplete{position:relative;}
  .ac-list{position:absolute;z-index:10;background:#fff;border:1px solid var(--border);border-radius:8px;width:100%;max-height:200px;overflow:auto;box-shadow:0 4px 10px rgba(0,0,0,.1);}
  .ac-item{padding:9px 12px;cursor:pointer;text-align:right;}
  .ac-item:hover{background:#EEF7F0;}
  .logout{background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff;font-size:12px;}
  @media print{
    header.top,.no-print{display:none !important;}
    body{background:#fff;}
  }
  .cert-print-area{display:none;}
  @media print{
    body.printing-cert *{visibility:hidden;}
    body.printing-cert .cert-print-area, body.printing-cert .cert-print-area *{visibility:visible;}
    body.printing-cert .cert-print-area{display:block !important;position:absolute;top:0;left:0;width:100%;}
    @page{size:A4 landscape;margin:0;}
  }
  .cert-sheet{width:297mm;height:210mm;margin:0 auto;box-sizing:border-box;position:relative;background:#faf6ea;font-family:'Segoe UI',Tahoma,Arial,sans-serif;overflow:hidden;padding:9mm;}
  .cert-checker-frame{position:absolute;inset:6mm;pointer-events:none;}
  .cert-checker{position:absolute;background-image:
      linear-gradient(45deg, var(--cert-color,#1F6F3D) 25%, transparent 25%, transparent 75%, var(--cert-color,#1F6F3D) 75%, var(--cert-color,#1F6F3D)),
      linear-gradient(45deg, var(--cert-color,#1F6F3D) 25%, transparent 25%, transparent 75%, var(--cert-color,#1F6F3D) 75%, var(--cert-color,#1F6F3D));
    background-size:9px 9px;background-position:0 0,4.5px 4.5px;background-color:#faf6ea;}
  .cert-checker.top{top:0;left:0;right:0;height:9px;}
  .cert-checker.bottom{bottom:0;left:0;right:0;height:9px;}
  .cert-checker.left{top:0;bottom:0;left:0;width:9px;}
  .cert-checker.right{top:0;bottom:0;right:0;width:9px;}
  .cert-gold-line{position:absolute;inset:12mm;border:1.5px solid var(--gold);}
  .cert-frame-inner{position:absolute;inset:14.5mm;border:1px solid var(--cert-color,#1F6F3D);}
  .cert-content{position:relative;z-index:1;height:100%;box-sizing:border-box;padding:18mm 26mm 12mm;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .cert-top-row{width:100%;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1mm;}
  .cert-logo-circle{width:58px;height:58px;flex-shrink:0;}
  .cert-logo-circle img{width:100%;height:100%;object-fit:contain;}
  .cert-top-text{text-align:right;}
  .cert-country{font-size:12px;font-weight:bold;color:#333;}
  .cert-center-name-lg{font-size:13.5px;font-weight:bold;color:var(--cert-color,#1F6F3D);margin-top:2px;}
  .cert-event-sub{font-size:10.5px;color:#555;margin-top:2px;}
  .cert-title-block{margin:1mm 0 0;}
  .cert-title-main{font-size:38px;font-weight:700;color:var(--cert-color,#1F6F3D);font-family:'Aref Ruqaa',serif;line-height:1.1;}
  .cert-title-type{font-size:19px;font-weight:bold;color:var(--gold-d);margin-top:-2px;font-family:'Aref Ruqaa',serif;}
  .cert-ayah{font-size:18px;color:#9c5b2e;font-weight:700;margin:2.5mm 0 1mm;line-height:1.7;font-family:'Amiri',serif;}
  .cert-stars{color:var(--gold-d);font-size:12px;letter-spacing:10px;margin-bottom:2.5mm;}
  .cert-intro{font-size:11.5px;color:#333;line-height:1.85;max-width:800px;margin-bottom:2.5mm;}
  .cert-intro strong{color:var(--cert-color,#1F6F3D);}
  .cert-honor-line{font-size:15px;font-weight:900;color:var(--cert-color,#1F6F3D);margin-bottom:2.5mm;}
  .cert-award-sentence{font-size:12.5px;color:#222;margin-bottom:1.5mm;}
  .cert-award-sentence strong{font-size:17px;color:var(--gold-d);}
  .cert-detail-text{font-size:12px;color:#222;line-height:1.85;max-width:820px;margin-bottom:1.5mm;}
  .cert-detail-text strong{color:var(--cert-color,#1F6F3D);}
  .cert-dua{font-size:11px;color:#444;line-height:1.8;max-width:760px;margin-bottom:2.5mm;}
  .cert-info-row{width:74%;display:flex;justify-content:space-around;font-size:11px;color:#333;border-top:1px solid var(--cert-color,#1F6F3D);border-bottom:1px solid var(--cert-color,#1F6F3D);padding:2mm 0;margin-bottom:2.5mm;}
  .cert-info-row .lbl{color:var(--cert-color,#1F6F3D);font-weight:bold;margin-left:5px;}
  .cert-qr-wrap{margin-bottom:2mm;}
  .cert-qr-wrap img{width:62px;height:62px;}
  .cert-qr-label{font-size:8.5px;color:var(--muted);}
  .cert-sign-row{width:100%;display:flex;justify-content:space-between;margin-top:auto;padding:0 12mm;font-size:11px;}
  .cert-sign-row div{text-align:center;}
  .cert-sign-row strong{display:block;margin-top:3px;font-size:13px;}
  .cert-footer2{font-size:8.5px;color:var(--muted);margin-top:2.5mm;}
  /* ---------- Mobile responsive ---------- */
  @media (max-width: 700px){
    #headerLogo{height:34px;}
    .wrap{padding:10px;}
    header.top{flex-direction:column;align-items:flex-start;gap:10px;padding:12px 16px;}
    header.top h1{font-size:16px;}
    header.top .sub{font-size:11px;}
    #headerRight{width:100%;justify-content:space-between;}
    .card{padding:14px;border-radius:10px;}
    .card h2{font-size:14.5px;}
    .row{flex-direction:column;align-items:stretch;gap:8px;}
    .row > div{width:100%;}
    .row input, .row select{width:100%;}
    .row > button{width:100%;}
    table{font-size:12px;}
    .card{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    th, td{padding:6px 5px;}
    .stat-cards{flex-direction:row;flex-wrap:wrap;}
    .stat{min-width:45%;}
    .group-grid{grid-template-columns:1fr;}
    .mark-btns{flex-wrap:wrap;justify-content:flex-start;gap:5px;}
    .mbtn{width:38px;height:36px;font-size:14px;}
    .login-card{width:100%;max-width:340px;}
    .modal-box{padding:16px;max-width:94vw;}
    .badge{font-size:11px;padding:3px 10px;}
    .tab{padding:8px 12px;font-size:12.5px;}
    .name-cell{white-space:nowrap;}
    .admin-layout{flex-direction:column;}
    .admin-sidebar{width:100%;flex-direction:row;overflow-x:auto;overflow-y:hidden;max-height:none;position:static;gap:6px;}
    .admin-sidebar .tab{white-space:nowrap;flex:0 0 auto;text-align:center;}
  }
  @media (max-width: 420px){
    .stat{min-width:100%;}
    header.top h1{font-size:14.5px;}
  }
  .modal-overlay{position:fixed;inset:0;background:rgba(20,30,25,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
  .modal-box{background:#fff;border-radius:12px;padding:22px;max-width:440px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.25);max-height:90vh;overflow:auto;}
  .modal-box h3{margin-top:0;color:var(--green-d);border-bottom:2px solid var(--gold);padding-bottom:8px;}
  .modal-box label{margin-top:10px;}
  .modal-box input, .modal-box select{width:100%;margin-bottom:4px;}
</style>

function migrateDB(db){
  if(db.nextStudentSeq === undefined) db.nextStudentSeq = (db.students?.length||0) + 1;
  if(!db.excuses) db.excuses = {};
  if(Array.isArray(db.excuses)){
    const rebuilt = {};
    db.excuses.forEach(e=>{
      if(!e.studentId) return;
      if(!rebuilt[e.studentId]) rebuilt[e.studentId] = {};
      rebuilt[e.studentId][e.id || uid()] = e;
    });
    db.excuses = rebuilt;
  }
  if(!db.locks) db.locks = {};
  if(!db.groups) db.groups = [];
  if(!db.students) db.students = [];
  if(!db.attendance) db.attendance = {};
  // One-time migration: old flat format was {"date|studentId": mark}; new format is {studentId: {date: mark}}
  {
    const oldKeys = Object.keys(db.attendance).filter(k=>k.includes("|"));
    if(oldKeys.length){
      const rebuilt = {};
      oldKeys.forEach(k=>{
        const [date, sid] = k.split("|");
        if(!rebuilt[sid]) rebuilt[sid] = {};
        rebuilt[sid][date] = db.attendance[k];
      });
      // Merge with any already-nested entries (non "|" keys)
      Object.keys(db.attendance).filter(k=>!k.includes("|")).forEach(sid=>{
        rebuilt[sid] = Object.assign(rebuilt[sid]||{}, db.attendance[sid]);
      });
      db.attendance = rebuilt;
    }
  }
  db.groups.forEach(g=>{ if(!g.groupType) g.groupType = "مختلط"; });
  if(!db.notes) db.notes = {};
  if(Array.isArray(db.notes)){
    const rebuilt = {};
    db.notes.forEach(n=>{
      if(!n.studentId) return;
      if(!rebuilt[n.studentId]) rebuilt[n.studentId] = {};
      rebuilt[n.studentId][n.id || uid()] = n;
    });
    db.notes = rebuilt;
  }
  if(!db.monthlyAnnouncements) db.monthlyAnnouncements = [];
  if(!db.messages) db.messages = [];
  if(!db.lastSeen) db.lastSeen = {};
  if(!db.adminUsers) db.adminUsers = [];
  if(db.mainAdminName === undefined) db.mainAdminName = "";
  if(db.mainAdminEmail === undefined) db.mainAdminEmail = "";
  if(db.mainAdminUsername === undefined) db.mainAdminUsername = "";
  if(db.recoveryQuestion === undefined) db.recoveryQuestion = "";
  if(db.recoveryAnswer === undefined) db.recoveryAnswer = "";
  if(db.defaultMonthlyFee === undefined) db.defaultMonthlyFee = 2000;
  if(!db.feePayments) db.feePayments = {};
  // One-time migration: old format was an array [{studentId, ...}]; new format is {studentId: {paymentId: {...}}}
  if(Array.isArray(db.feePayments)){
    const rebuilt = {};
    db.feePayments.forEach(p=>{
      if(!p.studentId) return;
      if(!rebuilt[p.studentId]) rebuilt[p.studentId] = {};
      rebuilt[p.studentId][p.id || uid()] = p;
    });
    db.feePayments = rebuilt;
  }
  if(!db.feeReminders) db.feeReminders = [];
  if(db.feeReminderTemplateParent === undefined) db.feeReminderTemplateParent = defaultDB().feeReminderTemplateParent;
  if(db.feeReminderTemplateSelf === undefined) db.feeReminderTemplateSelf = defaultDB().feeReminderTemplateSelf;
  if(db.feeReceiptTemplateFull === undefined) db.feeReceiptTemplateFull = defaultDB().feeReceiptTemplateFull;
  if(db.feeReceiptTemplatePartial === undefined) db.feeReceiptTemplatePartial = defaultDB().feeReceiptTemplatePartial;
  if(!db.certificates) db.certificates = [];
  if(!db.certSeqByYear) db.certSeqByYear = {};
  if(!db.studentsPublic) db.studentsPublic = {};
  if(!db.exams) db.exams = {};
  if(Array.isArray(db.exams)){
    const rebuilt = {};
    db.exams.forEach(ex=>{ rebuilt[ex.id] = ex; });
    db.exams = rebuilt;
  }
  if(!db.examResults) db.examResults = {};
  db.students.forEach(s=>{
    if(!s.status) s.status = "نشط";
    if(!s.code){ s.code = "R-"+String(db.nextStudentSeq++).padStart(4,"0"); }
    if(!s.feeCategory) s.feeCategory = "كامل";
    if(s.feeCustomAmount === undefined) s.feeCustomAmount = 0;
    if(!s.portalPin) s.portalPin = String(Math.floor(1000+Math.random()*9000));
    if(!s.groupName || s.curriculum === undefined){
      const g = db.groups.find(x=>x.id===s.groupId);
      s.groupName = g ? g.name : (s.groupName||"");
      s.curriculum = g ? (g.curriculum||"quran") : (s.curriculum||"quran");
    }
    db.studentsPublic[s.id] = publicStudentFields(s);
  });
  return db;
}

function publicStudentFields(s){
  return {
    id: s.id, name: s.name || "", code: s.code || "", gender: s.gender || "ذكر",
    groupId: s.groupId || null, groupName: s.groupName || "", curriculum: s.curriculum || "quran",
    currentSurah: s.currentSurah || "", status: s.status || "نشط",
    selfResponsible: !!s.selfResponsible, parentUid: s.parentUid || null
  };
}

const dbRef = firebase.database().ref("rayyanDB");
let DB = null;
let SAVE_ERROR_SHOWN = false;

function stripUndefined(value){
  if(value === undefined) return null;
  if(value === null) return null;
  if(Array.isArray(value)) return value.map(stripUndefined);
  if(typeof value === "object"){
    const out = {};
    Object.keys(value).forEach(k=>{ out[k] = stripUndefined(value[k]); });
    return out;
  }
  return value;
}

function saveDB(db){
  db.studentsPublic = {};
  (db.students||[]).forEach(s=>{ db.studentsPublic[s.id] = publicStudentFields(s); });
  DB = db;
  const clean = stripUndefined(db);
  return dbRef.set(clean).then(()=>{
    SAVE_ERROR_SHOWN = false;
    const el = document.getElementById("connStatus");
    if(el) el.innerHTML = "";
    return true;
  }).catch(err=>{
    console.error("Firebase save error:", err);
    const el = document.getElementById("connStatus");
    if(el) el.innerHTML = `<div class="msg err" style="position:fixed;top:8px;left:8px;right:8px;z-index:2000;font-size:13px;">⚠️ تعذّر الحفظ في السحابة: <strong>${err && err.code ? err.code : ""}</strong> — ${err && err.message ? err.message : "خطأ غير معروف"}<button onclick="this.parentElement.remove()" style="float:left;background:none;border:none;color:#fff;font-weight:bold;cursor:pointer;">✕</button></div>`;
    throw err;
  });
}

async function loadDBFromFirebase(){
  const snap = await dbRef.once("value");
  let db = snap.val();
  if(!db){
    db = defaultDB();
    await dbRef.set(db);
  } else {
    db = migrateDB(db);
  }
  return db;
}

async function ensureAdminUID(){
  const uid = firebase.auth().currentUser.uid;

    if(!snap.exists()){
      await ref.set(true);

}

async function ensureSystemAccountUID(){

let AUTO_REFRESH_TIMER = null;
function startAutoRefresh(){
  if(AUTO_REFRESH_TIMER) clearInterval(AUTO_REFRESH_TIMER);
  AUTO_REFRESH_TIMER = setInterval(async () => {
    if(!SESSION || SESSION.role === "parent" || SESSION.role === "proctor") return; // restricted, non-root reads
    const modalOpen = document.getElementById("modalRoot") && document.getElementById("modalRoot").innerHTML.trim() !== "";
    if(modalOpen) return; // don't disrupt someone mid-edit
    try{
      const snap = await dbRef.once("value");
      const fresh = snap.val();
      if(fresh){
        const freshStr = JSON.stringify(migrateDB(fresh));
        if(freshStr !== JSON.stringify(DB)){
          DB = JSON.parse(freshStr);
          render();
        }
      }
    }catch(e){ /* ignore, will retry next interval */ }
  }, 45000);
}

async function manualRefresh(){
  if(SESSION && (SESSION.role === "parent" || SESSION.role === "proctor")) return; // not applicable for restricted sessions
  try{
    const snap = await dbRef.once("value");
    const fresh = snap.val();
    if(fresh){ DB = migrateDB(fresh); render(); }
  }catch(e){ console.error("Refresh failed:", e); }
}

function render(){
  headerRight.innerHTML = "";

  const badge = document.createElement("span");

  if(SESSION.role === "admin"){
    if(isMainAdmin()){

    } else {
      const sub = (DB.adminUsers||[]).find(u=>u.username===SESSION.adminUsername);
      badge.textContent = (sub?.name ? sub.name + " — " : "") + "الإدارة (نائب)";
    }
  } else if(SESSION.role === "parent"){
    const s = PARENT_STATE ? PARENT_STATE.students.find(x=>x.id===SESSION.studentId) : null;
    badge.textContent = "ولي أمر — " + (s?.name || "");
  } else if(SESSION.role === "proctor"){
    badge.textContent = "مراقب امتحان — " + (PROCTOR_STATE?.title || "");
  } else {
    const g = DB.groups.find(g=>g.id===SESSION.groupId);
    badge.textContent = (g?.teacherName ? g.teacherName : "معلم/ة") + " — " + (g?.name || "");
  }
  const logoutBtn = document.createElement("button");
  logoutBtn.className = "logout"; logoutBtn.textContent = "خروج";
  logoutBtn.onclick = () => {
    firebase.auth().signOut().catch(()=>{});
    SESSION = null; DB = null; PARENT_STATE = null; PROCTOR_STATE = null;
    if(AUTO_REFRESH_TIMER) clearInterval(AUTO_REFRESH_TIMER);
    render();
  };
  headerRight.append(badge, logoutBtn);
  if(SESSION.role !== "parent" && SESSION.role !== "proctor"){
    const refreshBtn = document.createElement("button");
    refreshBtn.className = "logout"; refreshBtn.textContent = "🔄 تحديث";
    refreshBtn.onclick = () => manualRefresh();
    headerRight.insertBefore(refreshBtn, badge);
  }

  if(SESSION.role === "admin") renderAdmin();
  else if(SESSION.role === "parent") renderParent();
  else if(SESSION.role === "proctor") renderProctor();
  else renderTeacher();
}

    msg.innerHTML = `<div class="msg ok">جارٍ تسجيل الدخول...</div>`;
    firebase.auth().signInWithEmailAndPassword(email, pass).then(async () => {
      localStorage.setItem("rayyan_last_admin_email", email);
      await ensureAdminUID();
      await ensureSystemAccountUID();
      DB = await loadDBFromFirebase();
      if(!DB.mainAdminEmail){
        DB.mainAdminEmail = email; saveDB(DB);
        SESSION = {role:"admin", adminUsername:email, viaFirebase:true};
      } else if(email === DB.mainAdminEmail){
        SESSION = {role:"admin", adminUsername:email, viaFirebase:true};
      } else {
        const naib = (DB.adminUsers||[]).find(u=>u.email===email);
        SESSION = {role:"admin", adminUsername: naib ? naib.username : email, viaFirebase:false, naibId: naib?.id};
      }
      startAutoRefresh();
      render();
    }).catch(() => {
      msg.innerHTML = `<div class="msg err">بيانات الدخول غير صحيحة</div>`;
    });
  }

  document.getElementById("adminGo").onclick = () => {
    const idVal = document.getElementById("adminUser").value.trim();
    const pass = document.getElementById("adminPass").value;
    const msg = document.getElementById("loginMsg");
    if(!idVal || !pass){ msg.innerHTML = `<div class="msg err">أدخل البيانات المطلوبة</div>`; return; }
    if(!idVal.includes("@")){ msg.innerHTML = `<div class="msg err">أدخل البريد الإلكتروني الكامل لتسجيل الدخول</div>`; return; }
    firebaseSignIn(idVal, pass, msg);
  };
}

function parentEmailForPhone(phone){
  return `parent-${phone}@rayyan-portal.local`;
}
function pinToFirebasePassword(pin){
  // Firebase requires passwords of at least 6 characters; parents only ever see/enter the 4-digit PIN.
  return "ry-" + pin;
}

let PARENT_STATE = null; // {students:[...], attendance:{}, notes:[...], feePayments:[...], excuses:[...]}
let PROCTOR_STATE = null; // {examId, title, subject, date, maxScore, groupName, roster:[...]}

function showProctorLogin(){
  const f = document.getElementById("loginForm");
  f.innerHTML = `
    <label>كود المراقب (6 أرقام)</label>
    <input inputmode="numeric" maxlength="6" id="proctorCodeInput" style="width:100%;font-size:20px;text-align:center;letter-spacing:4px;" placeholder="------">
    <button class="btn-green" style="width:100%;margin-top:10px;" id="proctorGo">دخول</button>
    <p style="color:var(--muted);font-size:11px;margin-top:8px;">احصل على الكود من إدارة المركز — الكود خاص بامتحان واحد فقط.</p>
    <div id="loginMsg"></div>`;
  document.getElementById("proctorGo").onclick = async () => {
    const code = document.getElementById("proctorCodeInput").value.trim();
    const msg = document.getElementById("loginMsg");
    if(!code || code.length !== 6){ msg.innerHTML = `<div class="msg err">أدخل كوداً صحيحاً مكوّناً من 6 أرقام</div>`; return; }
    msg.innerHTML = `<div class="msg ok">جارٍ تسجيل الدخول...</div>`;
    try{
      const email = proctorEmailForCode(code);
      await firebase.auth().signInWithEmailAndPassword(email, codeToFirebasePassword(code));
      const uid = firebase.auth().currentUser.uid;
      const examIdSnap = await firebase.database().ref("examProctorIndex/"+uid).once("value");
      const examId = examIdSnap.val();
      if(!examId){ msg.innerHTML = `<div class="msg err">لم يتم العثور على امتحان مرتبط بهذا الكود</div>`; return; }
      const examSnap = await firebase.database().ref("rayyanDB/exams/"+examId).once("value");
      const exam = examSnap.val();
      if(!exam){ msg.innerHTML = `<div class="msg err">تعذّر تحميل بيانات الامتحان</div>`; return; }
      PROCTOR_STATE = { examId, ...exam };
      SESSION = {role:"proctor"};
      render();
    }catch(err){
      msg.innerHTML = `<div class="msg err">كود غير صحيح أو منتهي الصلاحية</div>`;
    }
  };
}

function renderProctor(){
  if(!PROCTOR_STATE){ SESSION = null; render(); return; }
  const ex = PROCTOR_STATE;
  const roster = ex.roster || [];
  app.innerHTML = `
    <div class="card">
      <h2>📝 ${ex.title}</h2>
      <p style="color:var(--muted);font-size:13px;">${ex.subject||""} — ${ex.date} — من ${ex.maxScore} درجة</p>
      <table>
        <tr><th>الرقم</th><th>الاسم</th><th>الدرجة</th><th>حفظ</th></tr>
        ${roster.map(s=>`
          <tr>
            <td style="font-weight:bold;color:var(--green-d)">${s.code}</td>
            <td class="name-cell">${s.name}</td>
            <td><input type="number" data-pscore="${s.id}" style="width:80px;" min="0" max="${ex.maxScore}"></td>
            <td><button class="btn-green btn-sm" data-p-save="${s.id}">حفظ</button></td>
          </tr>`).join("") || `<tr><td colspan="4" style="color:var(--muted)">لا يوجد طلاب</td></tr>`}
      </table>
      <div id="proctorSaveMsg"></div>
    </div>`;
  document.querySelectorAll("[data-p-save]").forEach(btn=>{
    btn.onclick = async () => {
      const sid = btn.dataset.pSave;
      const s = roster.find(r=>r.id===sid);
      const score = parseFloat(document.querySelector(`[data-pscore="${sid}"]`).value);
      const msg = document.getElementById("proctorSaveMsg");
      if(isNaN(score) || score < 0 || score > ex.maxScore){ msg.innerHTML = `<div class="msg err">أدخل درجة صحيحة (0-${ex.maxScore})</div>`; return; }
      const percentage = Math.round((score/ex.maxScore)*100);
      const grade = computeGrade(percentage);
      const resultObj = {
        id: uid(), examId: ex.examId, studentId: sid, examTitle: ex.title, examType: ex.type, date: ex.date,
        score, maxScore: ex.maxScore, percentage, grade, recommendation: "", published: !!ex.published,
        enteredAt: new Date().toISOString()
      };
      try{
        await firebase.database().ref("rayyanDB/examResults/"+sid+"/"+resultObj.id).set(resultObj);
        msg.innerHTML = `<div class="msg ok">تم حفظ نتيجة ${s.name} (${percentage}% — ${grade})</div>`;
      }catch(err){
        msg.innerHTML = `<div class="msg err">تعذّر الحفظ: ${err.message}</div>`;
      }
    };
  });
}

function showParentLogin(){
  const f = document.getElementById("loginForm");
  f.innerHTML = `
    <label>رقم الهاتف</label>
    <input id="parentPhone" style="width:100%" placeholder="253xxxxxxxx">
    <label style="margin-top:10px;">رمز PIN (4 أرقام)</label>
    <input type="password" inputmode="numeric" maxlength="4" id="parentPin" style="width:100%" placeholder="••••">
    <button class="btn-green" style="width:100%;margin-top:10px;" id="parentGo">دخول</button>
    <p style="color:var(--muted);font-size:11px;margin-top:8px;">احصل على PIN من إدارة المركز.</p>
    <div id="loginMsg"></div>`;
  document.getElementById("parentGo").onclick = async () => {
    const phone = document.getElementById("parentPhone").value.trim().replace(/[^0-9]/g,"");
    const pin = document.getElementById("parentPin").value.trim();
    const msg = document.getElementById("loginMsg");
    if(!phone || !pin){ msg.innerHTML = `<div class="msg err">أدخل رقم الهاتف والـ PIN</div>`; return; }
    msg.innerHTML = `<div class="msg ok">جارٍ تسجيل الدخول...</div>`;
    try{
      const email = parentEmailForPhone(phone);
      await firebase.auth().signInWithEmailAndPassword(email, pinToFirebasePassword(pin));
      const uid = firebase.auth().currentUser.uid;
      const idxSnap = await firebase.database().ref("parentIndex/"+uid).once("value");
      const idx = idxSnap.val();
      if(!idx || !idx.studentIds){ msg.innerHTML = `<div class="msg err">لم يتم العثور على بيانات مرتبطة بهذا الحساب</div>`; return; }
      const studentIds = Object.keys(idx.studentIds);
      const students = [];
      for(const sid of studentIds){
        const sSnap = await firebase.database().ref("rayyanDB/studentsPublic/"+sid).once("value");
        if(sSnap.exists()) students.push({id:sid, ...sSnap.val()});
      }
      if(!students.length){ msg.innerHTML = `<div class="msg err">تعذّر تحميل بيانات الطالب/ة</div>`; return; }

      const attendance = {};
      const feePayments = {};
      const notes = {};
      const excuses = {};
      const examResults = {};
      for(const sid of studentIds){
        const aSnap = await firebase.database().ref("rayyanDB/attendance/"+sid).once("value");
        attendance[sid] = aSnap.val() || {};
        const fSnap = await firebase.database().ref("rayyanDB/feePayments/"+sid).once("value");
        feePayments[sid] = fSnap.val() || {};
        const nSnap = await firebase.database().ref("rayyanDB/notes/"+sid).once("value");
        notes[sid] = Object.values(nSnap.val() || {});
        const eSnap = await firebase.database().ref("rayyanDB/excuses/"+sid).once("value");
        excuses[sid] = Object.values(eSnap.val() || {});
        const rSnap = await firebase.database().ref("rayyanDB/examResults/"+sid).once("value");
        examResults[sid] = Object.values(rSnap.val() || {});
      }
      const [annSnap, feeSettingSnap] = await Promise.all([
        firebase.database().ref("rayyanDB/monthlyAnnouncements").once("value"),
        firebase.database().ref("rayyanDB/defaultMonthlyFee").once("value")
      ]);
      PARENT_STATE = {
        students,
        attendance,
        notes,
        feePayments,
        excuses,
        examResults,
        monthlyAnnouncements: Object.values(annSnap.val() || {}),
        defaultMonthlyFee: feeSettingSnap.val() || 2000
      };
      SESSION = {role:"parent", studentId: students[0].id};
      render();
    }catch(err){
      msg.innerHTML = `<div class="msg err">بيانات الدخول غير صحيحة</div>`;
    }
  };
}

function renderAdminHome(c){
  const today = todayStr();

  const notesAlert = pendingNotes.length ? `
    <div class="card" style="border-right:5px solid var(--error);">
      <h2>⚠️ ملاحظات معلمين تحتاج متابعة (${pendingNotes.length})</h2>

        <span style="color:var(--absent)">غ ${counts["غ"]}</span>

  c.querySelectorAll(".group-box").forEach(b=>{
    b.onclick = () => { adminTab="view"; renderAdmin();
      setTimeout(()=>{ document.getElementById("viewGroup").value = b.dataset.g; document.getElementById("viewGroup").dispatchEvent(new Event("change")); },0);

      studentsFilterGroup = btn.dataset.viewStudents;
      adminTab = "students";
      renderAdmin();
    };
  });
  list.querySelectorAll("[data-edit-group]").forEach(btn=>{
    btn.onclick = () => {
      const g = DB.groups.find(x=>x.id===btn.dataset.editGroup);
      openModal(`
        <h3>تعديل بيانات المجموعة</h3>
        <label>اسم المجموعة</label>
        <input id="mGName" value="${g.name.replace(/"/g,'&quot;')}">
        <label>نوع المجموعة</label>
        <select id="mGType">
          <option value="ذكر" ${g.groupType==="ذكر"?"selected":""}>ذكر فقط</option>
          <option value="أنثى" ${g.groupType==="أنثى"?"selected":""}>أنثى فقط</option>
          <option value="مختلط" ${(!g.groupType||g.groupType==="مختلط")?"selected":""}>مختلط (ذكر وأنثى)</option>
        </select>
        <label>اسم المعلم/ة</label>
        <input id="mGTeacher" value="${(g.teacherName||"").replace(/"/g,'&quot;')}">
        <label>نوع المنهج</label>
        <select id="mGCurriculum">
          <option value="quran" ${(!g.curriculum||g.curriculum==="quran")?"selected":""}>قرآن (سور)</option>
          <option value="sighar" ${g.curriculum==="sighar"?"selected":""}>تمهيدي / صغار (لم يبلغوا القرآن بعد)</option>
        </select>
        <label>كلمة سر المعلم/ة ${isMainAdmin()?"":'<span style="color:var(--muted);font-weight:normal;">(للمدير الرئيسي فقط)</span>'}</label>
        <input id="mGPass" value="${(g.teacherPass||"").replace(/"/g,'&quot;')}" ${isMainAdmin()?"":"disabled"}>
        <div id="mGMsg"></div>
        <div class="row" style="justify-content:flex-end;margin-top:16px;">
          <button class="btn-outline btn-sm" id="mGCancel">إلغاء</button>
          <button class="btn-green btn-sm" id="mGSave">حفظ</button>
        </div>`);
      document.getElementById("mGCancel").onclick = closeModal;
      document.getElementById("mGSave").onclick = () => {
        const newName = document.getElementById("mGName").value.trim();
        const validType = document.getElementById("mGType").value;
        const newCurriculum = document.getElementById("mGCurriculum").value;
        const newTeacher = document.getElementById("mGTeacher").value.trim();
        const newPass = isMainAdmin() ? document.getElementById("mGPass").value.trim() : g.teacherPass;
        if(!newPass){ document.getElementById("mGMsg").innerHTML = `<div class="msg err">كلمة السر لا يمكن أن تكون فارغة</div>`; return; }

        const applyChanges = () => {
          g.name = newName || g.name;
          g.groupType = validType;
          g.curriculum = newCurriculum;
          g.teacherName = newTeacher;
          g.teacherPass = newPass;
          DB.students.filter(s=>s.groupId===g.id).forEach(s=>{ s.groupName = g.name; s.curriculum = g.curriculum; });
          saveDB(DB); closeModal(); renderAdminGroups(c);
        };

        const oldType = g.groupType || "مختلط";
        if(validType !== oldType && validType !== "مختلط"){
          const fixedGender = validType === "أنثى" ? "أنثى" : "ذكر";
          const affected = DB.students.filter(s=>s.groupId===g.id).length;
          if(affected){
            showConfirm(`تحويل النوع إلى "${validType}" سيضبط جنس جميع طلاب المجموعة (${affected}) تلقائياً إلى "${fixedGender}". هل تريد المتابعة؟`, () => {
              DB.students.filter(s=>s.groupId===g.id).forEach(s=>{ s.gender = fixedGender; });
              applyChanges();
            });
            return;
          }
        }
        applyChanges();
      };
    };
  });
  list.querySelectorAll("[data-del-group]").forEach(btn=>{
    btn.onclick = () => {
      showConfirm("حذف المجموعة وجميع طلابها؟", () => {
        const gid = btn.dataset.delGroup;
        DB.groups = DB.groups.filter(g=>g.id!==gid);
        DB.students = DB.students.filter(s=>s.groupId!==gid);
        saveDB(DB); renderAdminGroups(c);
      });
    };
  });
}

/* ---------------- Admin Students (unified) ---------------- */
let studentsFilterGroup = "";
let studentsFilterStatus = "";
let studentsFilterSearch = "";
function renderAdminStudents(c){
  const groupOpts = DB.groups.map(g=>`<option value="${g.id}" ${studentsFilterGroup===g.id?"selected":""}>${g.name}</option>`).join("");
  c.innerHTML = `
    <div class="card">
      <h2>إضافة طالب/ة جديد/ة</h2>
      <div class="row">
        <div><label>المجموعة</label>
          <select id="newStudGroup">
            <option value="">اختر المجموعة...</option>
            ${DB.groups.map(g=>`<option value="${g.id}">${g.name} (${g.groupType||"مختلط"})</option>`).join("")}
          </select>
        </div>
        <div><label>الاسم</label><input id="newStudName" placeholder="اسم الطالب/ة"></div>
        <div id="newStudGenderWrap" style="display:none;"><label>الجنس</label>
          <select id="newStudGender">
            <option value="">الجنس... *</option>
            <option value="ذكر">ذكر (طالب)</option>
            <option value="أنثى">أنثى (طالبة)</option>
          </select>
        </div>
        <div><label>هاتف ولي الأمر</label><input id="newStudPhone" placeholder="253xxxxxxxx"></div>
        <label style="font-weight:normal;font-size:12px;display:flex;align-items:center;gap:4px;align-self:flex-end;">
          <input type="checkbox" id="newStudSelf"> مسؤول/ة عن نفسه/ا
        </label>
        <div style="align-self:flex-end;"><button class="btn-green" id="addStudBtn">+ إضافة</button></div>
      </div>
      <div id="addStudMsg"></div>
    </div>
    <div class="card">
      <h2>🔎 تصفية وبحث</h2>
      <div class="row">
        <div><label>المجموعة</label>
          <select id="filterGroup">
            <option value="">كل المجموعات</option>
            ${groupOpts}
          </select>
        </div>
        <div><label>الحالة</label>
          <select id="filterStatus">
            <option value="">الكل</option>
            <option value="نشط" ${studentsFilterStatus==="نشط"?"selected":""}>نشط</option>
            <option value="موقوف" ${studentsFilterStatus==="موقوف"?"selected":""}>موقوف</option>
            <option value="قيد الانتظار" ${studentsFilterStatus==="قيد الانتظار"?"selected":""}>قيد الانتظار</option>
          </select>
        </div>
        <div style="flex:1;min-width:180px;"><label>بحث بالاسم أو الرقم</label><input id="filterSearch" value="${studentsFilterSearch}" placeholder="مثال: R-0007 أو الاسم"></div>
      </div>
    </div>
    <div id="studentsTableWrap"></div>`;

  const groupSelect = document.getElementById("newStudGroup");
  groupSelect.onchange = () => {
    const g = DB.groups.find(x=>x.id===groupSelect.value);
    const wrap = document.getElementById("newStudGenderWrap");
    wrap.style.display = (g && (g.groupType||"مختلط")==="مختلط") ? "block" : "none";
  };

  document.getElementById("addStudBtn").onclick = async () => {
    const gid = groupSelect.value;
    const msg = document.getElementById("addStudMsg");
    if(!gid){ msg.innerHTML = `<div class="msg err">اختر المجموعة أولاً</div>`; return; }
    const g = DB.groups.find(x=>x.id===gid);
    const name = document.getElementById("newStudName").value.trim();
    if(!name){ msg.innerHTML = `<div class="msg err">أدخل اسم الطالب/ة</div>`; return; }
    const isMixed = (g.groupType||"مختلط")==="مختلط";
    let gender = isMixed ? document.getElementById("newStudGender").value : (g.groupType==="أنثى"?"أنثى":"ذكر");
    if(isMixed && !gender){ msg.innerHTML = `<div class="msg err">هذه مجموعة مختلطة — يجب تحديد الجنس</div>`; return; }
    const phone = document.getElementById("newStudPhone").value.trim();
    const selfResponsible = document.getElementById("newStudSelf").checked;
    const code = nextStudentCode();
    const portalPin = String(Math.floor(1000+Math.random()*9000));
    DB.students.push({id:uid(), code, groupId:gid, name, gender, phone, selfResponsible, portalPin, groupName:g.name, curriculum:g.curriculum||"quran", status:"نشط", feeCategory:"كامل", feeCustomAmount:0});
    msg.innerHTML = `<div class="msg ok">جارٍ الحفظ...</div>`;
    try{
      await saveDB(DB);
      document.getElementById("newStudName").value = "";
      document.getElementById("newStudPhone").value = "";
      document.getElementById("newStudSelf").checked = false;
      msg.innerHTML = `<div class="msg ok">✅ تمت الإضافة وحُفظت في السحابة</div>`;
      drawStudentsTable();
    }catch(err){
      msg.innerHTML = `<div class="msg err">❌ تعذّر الحفظ: <strong>${err && err.code ? err.code : ""}</strong> — ${err && err.message ? err.message : "خطأ غير معروف"}<br><span style="font-size:11px;">جرّب: تسجيل الخروج ثم الدخول من جديد، أو تحقق من Firebase Rules.</span></div>`;
      // Roll back the local in-memory addition since the save failed
      DB.students = DB.students.filter(s=>s.code!==code);
    }
  };

  document.getElementById("filterGroup").value = studentsFilterGroup;
  document.getElementById("filterGroup").onchange = (e) => { studentsFilterGroup = e.target.value; drawStudentsTable(); };
  document.getElementById("filterStatus").onchange = (e) => { studentsFilterStatus = e.target.value; drawStudentsTable(); };
  document.getElementById("filterSearch").oninput = (e) => { studentsFilterSearch = e.target.value; drawStudentsTable(); };

  function drawStudentsTable(){
    const q = studentsFilterSearch.trim().toLowerCase();
    const filtered = DB.students.filter(s=>{
      if(studentsFilterGroup && s.groupId !== studentsFilterGroup) return false;
      if(studentsFilterStatus && (s.status||"نشط") !== studentsFilterStatus) return false;
      if(q && !(s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q))) return false;
      return true;
    });
    const wrap = document.getElementById("studentsTableWrap");
    wrap.innerHTML = `
      <div class="card">
        <h2>الطلاب (${filtered.length})</h2>
        <table>
          <tr><th>الحالة</th><th>المرحلة/السورة</th><th>الرقم</th><th>الاسم</th><th>المجموعة</th><th>الهاتف</th><th>PIN Portal</th><th>نقل</th><th>تعديل</th><th>حذف</th></tr>
          ${filtered.map(s=>{
            const g = DB.groups.find(x=>x.id===s.groupId);
            const status = s.status || "نشط";
            const statusColor = status==="نشط" ? "var(--present)" : status==="موقوف" ? "var(--error)" : "var(--late)";
            return `<tr>
              <td><span style="color:${statusColor};font-weight:bold;font-size:12px;">${status}</span><br><button class="btn-outline btn-sm" data-status-stud="${s.id}" style="margin-top:4px;">تغيير</button></td>
              <td style="color:var(--green-d);font-weight:bold;">${s.currentSurah||'<span style="color:var(--muted);font-weight:normal;font-size:11px;">—</span>'}</td>
              <td style="font-weight:bold;color:var(--green-d)">${s.code}</td>
              <td class="name-cell">${s.name} <span style="font-size:11px;color:var(--muted)">(${studentWord(s)})</span>${s.selfResponsible?' <span style="font-size:11px;color:var(--muted)">· مسؤول/ة عن نفسه/ا</span>':''}</td>
              <td>${g?g.name:"—"}</td>
              <td>${s.phone||"—"}</td>
              <td><button class="btn-outline btn-sm" data-pin-stud="${s.id}">${s.parentUid?'✅ مفعّل':'⛔ غير مفعّل'}</button></td>
              <td><button class="btn-gold btn-sm" data-transfer-stud="${s.id}">نقل</button></td>
              <td><button class="btn-outline btn-sm" data-edit-stud="${s.id}">تعديل</button></td>
              <td><button class="btn-danger btn-sm" data-del-stud="${s.id}">حذف</button></td>
            </tr>`;
          }).join("") || `<tr><td colspan="10" style="color:var(--muted)">لا يوجد طلاب/طالبات مطابقين</td></tr>`}
        </table>
      </div>`;

    wrap.querySelectorAll("[data-pin-stud]").forEach(btn=>{
      btn.onclick = () => {
        const s = DB.students.find(x=>x.id===btn.dataset.pinStud);
        const hasPhone = s.phone && s.phone.trim();
        const activated = !!s.parentUid;
        const waMsg = () => `السلام عليكم ورحمة الله،\nبيانات دخولك إلى بوابة ولي الأمر لمتابعة ${studentWord(s)}: ${s.name} في مركز الريان لتحفيظ القرآن الكريم وعلومه:\nرقم الهاتف: ${s.phone||""}\nرمز الدخول (PIN): ${s.portalPin}\n\nيمكنك من خلالها متابعة الحضور والرسوم والملاحظات في أي وقت.\n— مركز الريان لتحفيظ القرآن الكريم وعلومه`;
        const waLink = () => hasPhone ? `https://wa.me/${s.phone.replace(/[^0-9]/g,"")}?text=${encodeURIComponent(waMsg())}` : null;

        function draw(){
          openModal(`
            <h3>بوابة ولي الأمر: ${s.name}</h3>
            <p style="color:var(--muted);font-size:13px;">رقم الهاتف: <strong>${s.phone||"— لم يُسجَّل —"}</strong></p>
            <p style="font-size:13px;">الحالة: ${activated ? '<span style="color:var(--present);font-weight:bold;">✅ الحساب مُفعَّل</span>' : '<span style="color:var(--error);font-weight:bold;">⛔ لم يُفعَّل بعد</span>'}</p>
            <p style="font-size:22px;font-weight:bold;color:var(--green-d);text-align:center;background:#F2F7F3;border-radius:8px;padding:10px;margin:10px 0;">PIN: ${s.portalPin}</p>
            <div class="row" style="justify-content:center;">
              ${!activated
                ? `<button class="btn-green btn-sm" id="pinActivateBtn" ${hasPhone?"":"disabled"}>🔑 تفعيل حساب البوابة</button>`
                : `<button class="btn-outline btn-sm" id="pinRegenBtn">🔄 إعادة تعيين PIN</button>`}
              ${activated && waLink() ? `<a class="btn-green btn-sm" style="text-decoration:none;" target="_blank" href="${waLink()}">📲 إرسال بيانات الدخول واتساب</a>` : ""}
            </div>
            ${!hasPhone ? `<p style="color:var(--error);font-size:12px;text-align:center;">أضف رقم هاتف للطالب أولاً (زر "تعديل")</p>` : ""}
            ${activated ? `<div style="text-align:center;margin-top:6px;"><a href="#" id="pinDiagLink" style="font-size:11px;color:var(--muted);text-decoration:underline;">🔍 عرض بيانات التشخيص</a></div><div id="pinDiag" style="font-size:11px;color:var(--muted);background:#F7F7F7;padding:8px;border-radius:6px;margin-top:6px;display:none;word-break:break-all;"></div>` : ""}
            <div id="pinMsg"></div>
            <div class="row" style="justify-content:flex-end;margin-top:16px;">
              <button class="btn-outline btn-sm" id="pinClose">إغلاق</button>
            </div>`);
          document.getElementById("pinClose").onclick = closeModal;

          if(document.getElementById("pinDiagLink")){
            document.getElementById("pinDiagLink").onclick = async (e) => {
              e.preventDefault();
              const diagEl = document.getElementById("pinDiag");
              diagEl.style.display = "block";
              diagEl.textContent = "جارٍ الفحص...";
              const phoneDigits = (s.phone||"").replace(/[^0-9]/g,"");
              const email = parentEmailForPhone(phoneDigits);
              let idxResult = "؟";
              try{
                const idxSnap = await firebase.database().ref("parentIndex/"+s.parentUid).once("value");
                idxResult = JSON.stringify(idxSnap.val());
              }catch(err){
                idxResult = "خطأ في القراءة: " + err.message;
              }
              diagEl.innerHTML = `
                البريد المستخدم: ${email}<br>
                parentUid المسجّل على الطالب: ${s.parentUid}<br>
                studentId: ${s.id}<br>
                محتوى parentIndex/${s.parentUid}: ${idxResult}`;
            };
          }

          if(!activated && document.getElementById("pinActivateBtn")){
            document.getElementById("pinActivateBtn").onclick = async () => {
              const msgEl = document.getElementById("pinMsg");
              msgEl.innerHTML = `<div class="msg ok">جارٍ التفعيل...</div>`;
              try{
                const phoneDigits = s.phone.replace(/[^0-9]/g,"");
                const email = parentEmailForPhone(phoneDigits);
                // Check if a sibling already has an activated account for this phone
                const sibling = DB.students.find(x=>x.id!==s.id && x.parentUid && (x.phone||"").replace(/[^0-9]/g,"")===phoneDigits);
                if(sibling){
                  s.parentUid = sibling.parentUid;
                  s.portalPin = sibling.portalPin;
                  await firebase.database().ref("parentIndex/"+sibling.parentUid+"/studentIds/"+s.id).set(true);
                  saveDB(DB);
                  msgEl.innerHTML = `<div class="msg ok">تم ربط الحساب بحساب ${sibling.name} (نفس رقم الهاتف)</div>`;
                } else {
                  const secondaryApp = firebase.apps.find(a=>a.name==="Secondary") || firebase.initializeApp(window.firebaseConfig, "Secondary");
                  const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, pinToFirebasePassword(s.portalPin));
                  const newUid = cred.user.uid;
                  await secondaryApp.auth().signOut();
                  s.parentUid = newUid;
                  await firebase.database().ref("parentIndex/"+newUid+"/studentIds/"+s.id).set(true);
                  saveDB(DB);
                  msgEl.innerHTML = `<div class="msg ok">تم تفعيل الحساب بنجاح</div>`;
                }
                activated_reload();
              }catch(err){
                msgEl.innerHTML = `<div class="msg err">خطأ: ${err.message}</div>`;
              }
            };
          }
          if(activated && document.getElementById("pinRegenBtn")){
            document.getElementById("pinRegenBtn").onclick = async () => {
              const msgEl = document.getElementById("pinMsg");
              msgEl.innerHTML = `<div class="msg ok">جارٍ التحديث...</div>`;
              try{
                const phoneDigits = s.phone.replace(/[^0-9]/g,"");
                const email = parentEmailForPhone(phoneDigits);
                const oldPin = s.portalPin;
                const newPin = String(Math.floor(1000+Math.random()*9000));
                const secondaryApp = firebase.apps.find(a=>a.name==="Secondary") || firebase.initializeApp(window.firebaseConfig, "Secondary");
                try{
                  await secondaryApp.auth().signInWithEmailAndPassword(email, pinToFirebasePassword(oldPin));
                }catch(signInErr){
                  // Fallback: account may have been created before the 6-char password fix (legacy raw PIN)
                  await secondaryApp.auth().signInWithEmailAndPassword(email, oldPin);
                }
                await secondaryApp.auth().currentUser.updatePassword(pinToFirebasePassword(newPin));
                await secondaryApp.auth().signOut();
                // Re-ensure parentIndex is correct for this account and all linked siblings (self-healing)
                const linkedStudents = DB.students.filter(x=>x.parentUid===s.parentUid);
                for(const ls of linkedStudents){
                  await firebase.database().ref("parentIndex/"+s.parentUid+"/studentIds/"+ls.id).set(true);
                }
                // Update PIN for this student and any siblings sharing the same parentUid
                linkedStudents.forEach(x=>{ x.portalPin = newPin; });
                saveDB(DB);
                msgEl.innerHTML = `<div class="msg ok">تم توليد PIN جديد: ${newPin}</div>`;
                activated_reload();
              }catch(err){
                msgEl.innerHTML = `<div class="msg err">خطأ: ${err.message} (قد يتطلب الأمر تسجيل خروج ودخول الإدارة من جديد)</div>`;
              }
            };
          }
        }
        function activated_reload(){
          setTimeout(()=>{
            if(!SESSION || SESSION.role !== "admin" || !DB) return;
            closeModal(); drawStudentsTable();
          }, 1200);
        }
        draw();
      };
    });
    wrap.querySelectorAll("[data-edit-stud]").forEach(btn=>{
      btn.onclick = () => {
        const s = DB.students.find(x=>x.id===btn.dataset.editStud);
        const g = DB.groups.find(x=>x.id===s.groupId);
        const isMixedGroup = (g.groupType||"مختلط") === "مختلط";
        openModal(`
          <h3>تعديل بيانات الطالب/ة</h3>
          <label>الاسم</label>
          <input id="mName" value="${s.name.replace(/"/g,'&quot;')}">
          <label>رقم واتساب ولي الأمر</label>
          <input id="mPhone" value="${(s.phone||"").replace(/"/g,'&quot;')}" placeholder="253xxxxxxxx">
          ${isMixedGroup ? `
          <label>الجنس</label>
          <select id="mGender">
            <option value="ذكر" ${s.gender!=="أنثى"?"selected":""}>ذكر (طالب)</option>
            <option value="أنثى" ${s.gender==="أنثى"?"selected":""}>أنثى (طالبة)</option>
          </select>` : ""}
          <label style="display:flex;align-items:center;gap:6px;font-weight:normal;margin-top:12px;">
            <input type="checkbox" id="mSelf" style="width:auto;" ${s.selfResponsible?"checked":""}> مسؤول/ة عن نفسه/ا (بالغ)
          </label>
          <div class="row" style="justify-content:flex-end;margin-top:16px;">
            <button class="btn-outline btn-sm" id="mCancel">إلغاء</button>
            <button class="btn-green btn-sm" id="mSave">حفظ</button>
          </div>`);
        document.getElementById("mCancel").onclick = closeModal;
        document.getElementById("mSave").onclick = () => {
          const newName = document.getElementById("mName").value.trim();
          s.name = newName || s.name;
          s.phone = document.getElementById("mPhone").value.trim();
          s.gender = isMixedGroup ? document.getElementById("mGender").value : (g.groupType==="أنثى"?"أنثى":"ذكر");
          s.selfResponsible = document.getElementById("mSelf").checked;
          saveDB(DB); closeModal(); drawStudentsTable();
        };
      };
    });
    wrap.querySelectorAll("[data-del-stud]").forEach(btn=>{
      btn.onclick = () => {
        showConfirm("حذف هذا الطالب/ة؟", () => {
          DB.students = DB.students.filter(s=>s.id!==btn.dataset.delStud);
          saveDB(DB); drawStudentsTable();
        });
      };
    });
    wrap.querySelectorAll("[data-transfer-stud]").forEach(btn=>{
      btn.onclick = () => {
        const s = DB.students.find(x=>x.id===btn.dataset.transferStud);
        const currentGroup = DB.groups.find(x=>x.id===s.groupId);
        const otherGroups = DB.groups.filter(x=>x.id!==s.groupId);
        openModal(`
          <h3>نقل ${studentWord(s)}: ${s.name}</h3>
          <p style="color:var(--muted);font-size:13px;margin-top:-6px;">من: <strong>${currentGroup?currentGroup.name:"—"}</strong></p>

          </div>`);

          const newStatus = document.getElementById("mStatus").value;
          const reason = document.getElementById("mStatusReason").value.trim();
          const oldStatus = s.status || "نشط";
          s.status = newStatus;
          saveDB(DB);
          if(newStatus !== oldStatus && newStatus !== "نشط"){
            const reasonTxt = reason ? `\nالسبب: ${reason}` : "";
            DB.messages.push({
              id: uid(), groupId: s.groupId,
              text: `⛔ تنبيه: ${studentWord(s)} ${s.name} (${s.code}) أصبح/ت "${newStatus}" — يُرجى عدم السماح له/ا بحضور الدرس أو القرآن حتى إشعار آخر من الإدارة.${reasonTxt}`,
              createdAt: new Date().toISOString()
            });
            saveDB(DB);
          } else if(newStatus === "نشط" && oldStatus !== "نشط"){
            DB.messages.push({
              id: uid(), groupId: s.groupId,
              text: `✅ تنبيه: ${studentWord(s)} ${s.name} (${s.code}) عاد/ت إلى الحالة "نشط" — يمكنه/ا استئناف حضور الدرس والقرآن.`,
              createdAt: new Date().toISOString()
            });
            saveDB(DB);
          }
          closeModal(); drawStudentsTable();
        };
      };
    });
  }
  drawStudentsTable();
}

/* ---------------- Admin Fees ---------------- */
function computeFeeAmount(s){
  if(s.feeCategory === "مجاني") return 0;
  if(s.feeCategory === "مخفض") return s.feeCustomAmount || 0;
  return DB.defaultMonthlyFee || 0;
}
function computeFeeAmountFor(s){
  if(s.feeCategory === "مجاني") return 0;
  if(s.feeCategory === "مخفض") return s.feeCustomAmount || 0;
  return (PARENT_STATE && PARENT_STATE.defaultMonthlyFee) || 2000;
}
function computePaidAmount(studentId, year, month){
  const payments = DB.feePayments[studentId] ? Object.values(DB.feePayments[studentId]) : [];
  return payments
    .filter(p=>p.year===year && p.month===month)
    .reduce((sum,p)=>sum+p.amount, 0);
}
function feeStatus(due, paid){
  if(due <= 0) return "معفى";
  if(paid <= 0) return "غير مدفوع";
  if(paid >= due) return "مدفوع بالكامل";
  return "مدفوع جزئياً";
}
function buildFeeWhatsAppLink(student, amount, monthLabel, remaining){
  const phoneDigits = (student.phone||"").replace(/[^0-9]/g,"");
  const word = studentWord(student, true);
  const template = remaining > 0 ? DB.feeReceiptTemplatePartial : DB.feeReceiptTemplateFull;
  const msg = template
    .replaceAll("{name}", student.name)
    .replaceAll("{code}", student.code)
    .replaceAll("{amount}", amount.toLocaleString())
    .replaceAll("{remaining}", remaining.toLocaleString())
    .replaceAll("{month}", monthLabel)
    .replaceAll("{word}", word);
  return `https://wa.me/${phoneDigits}?text=${encodeURIComponent(msg)}`;
}

function buildFeeReminderLink(student, due, monthLabel){
  const phoneDigits = (student.phone||"").replace(/[^0-9]/g,"");
  const word = studentWord(student, true);
  const template = student.selfResponsible ? DB.feeReminderTemplateSelf : DB.feeReminderTemplateParent;
  const msg = template
    .replaceAll("{name}", student.name)
    .replaceAll("{code}", student.code)
    .replaceAll("{amount}", due.toLocaleString())
    .replaceAll("{month}", monthLabel)
    .replaceAll("{word}", word);
  return `https://wa.me/${phoneDigits}?text=${encodeURIComponent(msg)}`;
}

          if(amount <= 0){ msg.innerHTML = `<div class="msg err">أدخل مبلغاً صحيحاً</div>`; return; }
          const payId = uid();
          if(!DB.feePayments[s.id]) DB.feePayments[s.id] = {};
          DB.feePayments[s.id][payId] = {id:payId, year, month, amount, method, note, paidAt:new Date().toISOString()};
          saveDB(DB);
          const newPaid = paidSoFar + amount;
          const newRemaining = Math.max(due - newPaid, 0);
          const hasPhone = s.phone && s.phone.trim();
          msg.innerHTML = `<div class="msg ok">تم تسجيل الدفعة</div>
            ${hasPhone ? `<a class="btn-green btn-sm" style="display:block;text-align:center;text-decoration:none;margin-top:8px;" target="_blank" href="${buildFeeWhatsAppLink(s, amount, monthLabel, newRemaining)}">📲 إرسال إيصال واتساب</a>` : `<div class="msg err" style="margin-top:8px;">لا يوجد رقم هاتف مسجَّل لإرسال إيصال</div>`}
            <button class="btn-outline btn-sm" style="width:100%;margin-top:8px;" id="mPayClose">إغلاق</button>`;
          document.getElementById("mPayClose") && (document.getElementById("mPayClose").onclick = () => { closeModal(); draw(); });
        };
      };
    });
  }
  draw();
}

function genderize(text, gender){
  if(gender === "أنثى") return text.replace(/ه\/ا/g,"ها").replace(/ه\/ة/g,"تها");
  return text.replace(/ه\/ا/g,"ه").replace(/ه\/ة/g,"ته");
}

function nextCertNumber(year){
  if(!DB.certSeqByYear[year]) DB.certSeqByYear[year] = 0;
  DB.certSeqByYear[year]++;
  return `MRJ-${year}-${String(DB.certSeqByYear[year]).padStart(3,"0")}`;
}

      ${ex.proctorCode ? `
        <p style="font-size:26px;font-weight:bold;color:var(--green-d);text-align:center;background:#F2F7F3;border-radius:8px;padding:12px;margin:10px 0;">${ex.proctorCode}</p>
        <div class="row" style="justify-content:center;">
          <button class="btn-outline btn-sm" id="proctorRegenBtn">🔄 إنشاء كود جديد (يلغي القديم)</button>
        </div>
      ` : `
        <div class="row" style="justify-content:center;">
          <button class="btn-green btn-sm" id="proctorCreateBtn">🔑 إنشاء كود الآن</button>
        </div>
      `}
      <div id="proctorMsg"></div>
      <div class="row" style="justify-content:flex-end;margin-top:16px;">
        <button class="btn-outline btn-sm" id="proctorClose">إغلاق</button>
      </div>`);
    document.getElementById("proctorClose").onclick = closeModal;

    async function createOrRegenerate(){
      const msgEl = document.getElementById("proctorMsg");
      msgEl.innerHTML = `<div class="msg ok">جارٍ الإنشاء...</div>`;
      try{
        const code = generateProctorCode();
        const email = proctorEmailForCode(code);
        const secondaryApp = firebase.apps.find(a=>a.name==="Secondary") || firebase.initializeApp(window.firebaseConfig, "Secondary");
        const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, codeToFirebasePassword(code));
        const proctorUid = cred.user.uid;
        await secondaryApp.auth().signOut();
        ex.proctorCode = code;
        ex.proctorUid = proctorUid;
        ex.roster = studs.map(s=>({id:s.id, name:s.name, code:s.code}));
        await firebase.database().ref("examProctorIndex/"+proctorUid).set(ex.id);
        saveDB(DB);
        msgEl.innerHTML = `<div class="msg ok">✅ تم إنشاء الكود: ${code}</div>`;
        setTimeout(()=>{ closeModal(); drawExamsList(); }, 1000);
      }catch(err){
        msgEl.innerHTML = `<div class="msg err">خطأ: ${err.message}</div>`;
      }
    }
    if(document.getElementById("proctorCreateBtn")) document.getElementById("proctorCreateBtn").onclick = createOrRegenerate;
    if(document.getElementById("proctorRegenBtn")) document.getElementById("proctorRegenBtn").onclick = createOrRegenerate;
  }

  function drawResultsEntry(examId){
    const ex = examById(examId);
    if(!ex) return;
    const studs = DB.students.filter(s=>s.groupId===ex.groupId);
    document.getElementById("examResultsWrap").innerHTML = `
      <div class="card">
        <h2>📝 نتائج: ${ex.title} <span style="font-size:12px;color:var(--muted);font-weight:normal;">(${ex.date} — من ${ex.maxScore} درجة)</span></h2>
        <table>
          <tr><th>الرقم</th><th>الاسم</th><th>الدرجة</th><th>النسبة</th><th>التقدير</th><th>التوصية</th><th>حفظ</th></tr>
          ${studs.map(s=>{
            const existing = resultsFor(s.id).find(r=>r.examId===examId);
            return `<tr>
              <td style="font-weight:bold;color:var(--green-d)">${s.code}</td>
              <td class="name-cell">${s.name}</td>
              <td><input type="number" data-score="${s.id}" value="${existing?existing.score:''}" style="width:70px;" min="0" max="${ex.maxScore}"></td>
              <td><span data-pct="${s.id}">${existing?existing.percentage+'%':'—'}</span></td>
              <td><span data-grade="${s.id}" style="color:${existing?gradeColor(existing.grade):'var(--muted)'};font-weight:bold;">${existing?existing.grade:'—'}</span></td>
              <td><input data-rec="${s.id}" value="${existing?(existing.recommendation||'').replace(/"/g,'&quot;'):''}" placeholder="اختياري..." style="width:160px;"></td>
              <td><button class="btn-green btn-sm" data-save-result="${s.id}">حفظ</button></td>
            </tr>`;
          }).join("") || `<tr><td colspan="7" style="color:var(--muted)">لا يوجد طلاب في هذه المجموعة</td></tr>`}
        </table>
        <div id="resultsSaveMsg"></div>
      </div>`;

    document.querySelectorAll("[data-save-result]").forEach(btn=>{
      btn.onclick = () => {
        const sid = btn.dataset.saveResult;
        const s = DB.students.find(x=>x.id===sid);
        const scoreInput = document.querySelector(`[data-score="${sid}"]`);
        const score = parseFloat(scoreInput.value);
        const msg = document.getElementById("resultsSaveMsg");
        if(isNaN(score) || score < 0 || score > ex.maxScore){ msg.innerHTML = `<div class="msg err">أدخل درجة صحيحة (0-${ex.maxScore})</div>`; return; }
        const percentage = Math.round((score/ex.maxScore)*100);
        const grade = computeGrade(percentage);
        const recommendation = document.querySelector(`[data-rec="${sid}"]`).value.trim();
        const existing = resultsFor(sid).find(r=>r.examId===examId);
        const resultObj = {
          id: existing ? existing.id : uid(),
          examId, studentId: sid, examTitle: ex.title, examType: ex.type, date: ex.date,
          score, maxScore: ex.maxScore, percentage, grade, recommendation, published: !!ex.published,
          enteredAt: new Date().toISOString()
        };
        addExamResult(sid, resultObj);
        saveDB(DB);
        document.querySelector(`[data-pct="${sid}"]`).textContent = percentage+"%";
        const gradeEl = document.querySelector(`[data-grade="${sid}"]`);
        gradeEl.textContent = grade;
        gradeEl.style.color = gradeColor(grade);
        msg.innerHTML = `<div class="msg ok">تم حفظ نتيجة ${s.name}</div>`;
        drawExamsList();
      };
    });
  }

  drawExamsList();
}

function renderAdminView(c){
  const opts = DB.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join("");
  c.innerHTML = `
    <div class="card">
      <h2>متابعة الحضور — عرض وتعديل مباشر</h2>
      <p style="color:var(--muted);font-size:13px;">بصفتك الإدارة يمكنك تعديل الحضور دائماً، حتى بعد أن يُثبّته المعلم/ة.</p>
      <div class="row">
        <div><label>المجموعة</label><select id="viewGroup">${opts || "<option value=''>لا توجد مجموعات</option>"}</select></div>
        <div><label>التاريخ</label><input type="date" id="viewDate" value="${todayStr()}"></div>
        <div style="align-self:flex-end;">
          <button class="btn-outline btn-sm" id="viewDateMinus">-1 يوم</button>
          <button class="btn-outline btn-sm" id="viewDatePlus">+1 يوم</button>
        </div>
      </div>
      <div id="lockStatus" style="margin-top:10px;"></div>
      <div id="viewTable" style="margin-top:14px;"></div>
    </div>`;
  const draw = () => {
    const gid = document.getElementById("viewGroup").value;
    const date = document.getElementById("viewDate").value;
    const studs = DB.students.filter(s=>s.groupId===gid);
    const locked = isLocked(date, gid);

    document.getElementById("lockStatus").innerHTML = gid ? `
      <div class="row">
        <span class="msg ${locked?'ok':'err'}" style="border:1px solid ${locked?'var(--present)':'var(--muted)'};">
          ${locked ? "✅ مثبَّت من قبل المعلم/ة — يمكنك التعديل" : "🔓 لم يُثبَّت بعد من قبل المعلم/ة"}
        </span>
        <button class="btn-outline btn-sm" id="toggleLockBtn">${locked ? "🔓 إعادة فتح للمعلم/ة" : "🔒 تثبيت هذا اليوم"}</button>
      </div>` : "";

    const rows = studs.map(s=>{
      const current = getAttendance(s.id, date);
      const btns = MARKS.map(m=>`<button type="button" class="mbtn ${current===m.code?'sel-'+m.cls:''}" data-sid="${s.id}" data-mark="${m.code}" title="${m.label}">${m.code}</button>`).join("");
      return `<tr><td style="font-weight:bold;color:var(--green-d)">${s.code}</td><td class="name-cell">${s.name}</td><td><div class="mark-btns">${btns}</div></td></tr>`;
    }).join("");
    document.getElementById("viewTable").innerHTML = `
      <table><tr><th>الرقم</th><th>اسم الطالب</th><th>الحالة — ${fmtDate(date)}</th></tr>
      ${rows || `<tr><td colspan="3" style="color:var(--muted)">لا يوجد طلاب في هذه المجموعة</td></tr>`}</table>`;

    document.querySelectorAll("#viewTable .mbtn").forEach(btn=>{
      btn.onclick = () => {
        setAttendanceMark(btn.dataset.sid, date, btn.dataset.mark);
        saveDB(DB);
        draw();
      };
    });
    const toggleBtn = document.getElementById("toggleLockBtn");
    if(toggleBtn) toggleBtn.onclick = () => { setLock(date, gid, !locked); draw(); };
  };
  document.getElementById("viewGroup").onchange = draw;
  document.getElementById("viewDate").onchange = draw;
  function shiftViewDate(delta){
    const input = document.getElementById("viewDate");
    const d = new Date(input.value+"T00:00:00");
    d.setDate(d.getDate()+delta);
    input.value = d.toISOString().slice(0,10);
    draw();
  }
  document.getElementById("viewDateMinus").onclick = () => shiftViewDate(-1);
  document.getElementById("viewDatePlus").onclick = () => shiftViewDate(1);
  if(DB.groups.length) draw();
}

function showStudentReport(sid){
  const s = DB.students.find(x=>x.id===sid);
  const g = DB.groups.find(x=>x.id===s.groupId);
  const records = Object.entries(DB.attendance[sid] || {})
    .map(([date,mark])=>({date, mark}))
    .sort((a,b)=>b.date.localeCompare(a.date));
  const counts = {"✓":0,"x":0,"ت":0,"غ":0,"م":0};
  records.forEach(r=>counts[r.mark]++);
  const total = records.length || 1;
  const pct = Math.round((counts["✓"]/total)*100);

  const el = document.getElementById("searchResult");
  el.innerHTML = `
    <div class="card">
      <h2>${s.name} <span style="font-size:12px;color:var(--muted);font-weight:normal;">— رقم: ${s.code} · ${g?g.name:""}</span>
        <button class="btn-outline btn-sm no-print" style="float:left" onclick="window.print()">🖨️ طباعة</button>
      </h2>
      ${s.currentSurah ? `<p style="margin:0 0 10px;"><span class="badge" style="background:var(--green);">📖 ${g && g.curriculum==="sighar" ? "المرحلة الحالية" : "السورة الحالية"}: ${s.currentSurah}</span></p>` : ""}
      <div class="stat-cards">
        <div class="stat"><div class="n" style="color:var(--present)">${counts["✓"]}</div><div class="l">حاضر / صح</div></div>
        <div class="stat"><div class="n" style="color:var(--error)">${counts["x"]}</div><div class="l">خطأ</div></div>
        <div class="stat"><div class="n" style="color:var(--late)">${counts["ت"]}</div><div class="l">تأخر</div></div>
        <div class="stat"><div class="n" style="color:var(--absent)">${counts["غ"]}</div><div class="l">غياب</div></div>
        <div class="stat"><div class="n" style="color:var(--noquran)">${counts["م"]}</div><div class="l">لا يوجد قرآن</div></div>
        <div class="stat"><div class="n" style="color:var(--green)">${pct}%</div><div class="l">نسبة الحضور</div></div>
      </div>
      <h2 style="margin-top:18px;">سجل الأيام (الأحدث أولاً)</h2>
      <table>
        <tr><th>التاريخ</th><th>الحالة</th></tr>
        ${records.map(r=>{
          const labelMap = {"✓":"حاضر/صح","x":"خطأ","ت":"تأخر","غ":"غياب","م":"لا يوجد قرآن"};
          const colorMap = {"✓":"var(--present)","x":"var(--error)","ت":"var(--late)","غ":"var(--absent)","م":"var(--noquran)"};
          return `<tr><td>${fmtDate(r.date)}</td><td style="color:${colorMap[r.mark]};font-weight:bold">${r.mark} — ${labelMap[r.mark]}</td></tr>`;
        }).join("") || `<tr><td colspan="2" style="color:var(--muted)">لا يوجد سجل بعد</td></tr>`}
      </table>
    </div>`;
}

function buildWhatsAppLink(student, noteText, category){
  const phoneDigits = (student.phone||"").replace(/[^0-9]/g,"");
  const word = studentWord(student, true);
  let msg;
  if(student.selfResponsible){
    msg = `السلام عليكم ورحمة الله،\nنود إبلاغك بخصوص وضعك في مركز الريان لتحفيظ القرآن الكريم وعلومه.\nنوع الملاحظة: ${category}\nالتفاصيل: ${noteText}\nيُرجى منك التكرم بزيارة إدارة المركز في أقرب وقت ممكن.\nجزاك الله خيراً.`;
  } else {
    msg = `السلام عليكم ورحمة الله،\nنود إبلاغكم بخصوص ${word}: ${student.name} (${student.code}) في مركز الريان لتحفيظ القرآن الكريم وعلومه.\nنوع الملاحظة: ${category}\nالتفاصيل: ${noteText}\nيُرجى من ولي الأمر التكرم بزيارة إدارة المركز في أقرب وقت ممكن.\nجزاكم الله خيراً.`;
  }
  return `https://wa.me/${phoneDigits}?text=${encodeURIComponent(msg)}`;
}

function workdaysInMonth(year, month){
  const days = [];
  const daysInMonth = new Date(year, month, 0).getDate();
  for(let d=1; d<=daysInMonth; d++){
    const dt = new Date(year, month-1, d);
    const wd = dt.getDay(); // 0=Sunday...4=Thursday,5=Friday,6=Saturday
    if(wd===4 || wd===5) continue; // skip Thursday(4) & Friday(5) — shifted night-dates
    days.push(`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
  }
  return days;
}

function computeMonthlyScores(groupId, year, month){
  const studs = DB.students.filter(s=>s.groupId===groupId);
  const days = workdaysInMonth(year, month);
  return studs.map(s=>{
    let pPresent=0, pNoQuran=0, pExcused=0, nAbsent=0, nLate=0, nError=0;
    days.forEach(date=>{
      const mark = getAttendance(s.id, date);
      const excused = excusesFor(s.id).some(e=>e.from<=date && date<=e.to);
      if(mark==="✓") pPresent++;
      else if(mark==="م") pNoQuran++;
      else if(excused) pExcused++;
      else if(mark==="غ") nAbsent++;
      else if(mark==="ت") nLate++;
      else if(mark==="x") nError++;
    });
    const positive = pPresent + pNoQuran + pExcused;
    const negative = nAbsent + nLate + nError;
    return {student:s, pPresent, pNoQuran, pExcused, positive, nAbsent, nLate, nError, negative};
  }).sort((a,b)=> b.positive - a.positive || a.negative - b.negative);
}

          <input type="password" id="newSubOwnPass" placeholder="كلمة سر جديدة لحسابك">

        <p style="color:var(--muted);margin:0;">🔒 إدارة الحسابات الأخرى (المدير الرئيسي، المستخدمين الآخرين، وكلمات سر المعلمين) متاحة فقط للمدير الرئيسي.</p>
      </div>`;
    document.getElementById("saveSubOwnPass").onclick = () => {
      const v = document.getElementById("newSubOwnPass").value.trim();
      const msg = document.getElementById("subOwnMsg");
